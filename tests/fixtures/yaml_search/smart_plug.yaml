# Basic Config
esphome:
  name: smart_plug_a
  platform: ESP8266
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: $devicename Fallback Hotspot
    password: !secret ap_password

logger:
  baud_rate: 0  # (UART logging interferes with cse7766)
api:
ota:

# Device Specific Config

uart:
  rx_pin: RX
  baud_rate: 4800

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Smart Plug Button"
    on_press:
      - switch.toggle: relay
  - platform: status
    name: "Smart Plug Status"

sensor:
  - platform: wifi_signal
    name: "Smart Plug WiFi Signal"
    update_interval: 60s
  - platform: cse7766
    current:
      name: "Smart Plug Current"
      accuracy_decimals: 1
    voltage:
      name: "Smart Plug Voltage"
      accuracy_decimals: 1
    power:
      name: "Smart Plug Power"
      accuracy_decimals: 1
switch:
  - platform: gpio
    name: "Smart Plug Relay"
    pin: GPIO12
    id: relay
    restore_mode: RESTORE_DEFAULT_ON

status_led:
  pin: GPIO13
