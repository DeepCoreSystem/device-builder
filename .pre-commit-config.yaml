# ``sync-boards`` regenerates the board catalog from the manifests + ESPHome's
# board data, so it needs ``esphome`` importable. pre-commit.ci runs hooks in a
# slim env with no project install, so it's skipped there; the catalog stays
# enforced by ``test_split_artefacts_match_manifests`` in the test job.
ci:
  skip: [sync-boards]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: validate-definitions
        name: validate board/component definitions
        entry: python script/validate_definitions.py
        language: python
        additional_dependencies: [pyyaml, jsonschema]
        pass_filenames: false
        files: ^esphome_device_builder/definitions/
        types: [yaml]
      - id: sync-boards
        name: regenerate boards.json from manifests
        entry: python script/sync_boards.py
        # ``language: system`` runs in the project venv so the script imports
        # the same ``esphome`` the catalog is generated against — no second
        # version to pin and drift. Skipped on pre-commit.ci (see top ``ci:``).
        language: system
        pass_filenames: false
        files: ^esphome_device_builder/definitions/boards/.*\.yaml$
        types: [yaml]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
        # Test fixtures intentionally contain ESPHome-specific
        # custom tags (``!secret``, ``!include``) that the plain
        # PyYAML loader can't resolve. The fixtures are read as
        # raw text by the YAML-search code path under test, not
        # parsed.
        exclude: ^tests/fixtures/
      - id: check-json
        exclude: ^\.vscode/
      - id: check-ast
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        exclude: ^esphome_device_builder/definitions/
        additional_dependencies:
          - tomli
