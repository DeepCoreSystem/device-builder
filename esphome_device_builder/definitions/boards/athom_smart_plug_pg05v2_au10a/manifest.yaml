id: athom_smart_plug_pg05v2_au10a
name: Athom Smart Plug AU V2 (PG05V2-AU10A)
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- images/athom-plug-au-v2.webp
tags:
- relay
- compact
pins:
- gpio: 5
  available: false
  occupied_by: binary_sensor.gpio (${friendly_name} Power Button)
- gpio: 12
  available: false
  occupied_by: switch.gpio (${friendly_name})
- gpio: 13
  available: false
  occupied_by: light.status_led (${friendly_name} Status LED)
docs_url: https://devices.esphome.io/devices/Athom-Smart-Plug-PG05V2-AU10A/
