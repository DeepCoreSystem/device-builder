featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 5
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    disabled_by_default: true
    id: binary_sensor_gpio_1
    name: Gpio 1
- id: button_safe_mode_1
  component_id: button.safe_mode
  fields:
    internal: false
    id: button_safe_mode_1
    name: Safe Mode
- id: light_status_led_1
  component_id: light.status_led
  fields:
    disabled_by_default: true
    pin:
      value:
        inverted: true
        number: 13
      locked: true
    id: light_status_led_1
    name: Status Led 1
- id: sensor_template_1
  component_id: sensor.template
  fields:
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    icon: mdi:lightning-bolt
    accuracy_decimals: 3
    lambda: return id(total_energy);
    update_interval: 10s
    id: sensor_template_1
    name: Template 1
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    restore: true
    power_id: power_sensor
    unit_of_measurement: kWh
    accuracy_decimals: 3
    id: sensor_total_daily_energy_1
    name: Total Daily Energy 1
- id: switch_gpio_1
  component_id: switch.gpio
  fields:
    pin:
      value: 12
      locked: true
    id: switch_gpio_1
    name: Gpio 1
