id: m5stack-poesp32
name: M5Stack PoESP32
description: M5Stack PoESP32 Ethernet/PoE unit with ESP32 and an onboard IP101 Ethernet PHY.
manufacturer: M5Stack
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
  framework: esp-idf
hardware:
  flash_size: 4MB
  connectivity:
  - wifi
  - bluetooth
  - ethernet
tags:
- compact
- poe
docs_url: https://esphome.io/components/ethernet.html
featured_components:
- id: onboard_ethernet
  component_id: ethernet
  name: Onboard Ethernet
  description: Built-in IP101 Ethernet PHY with PoE — wired networking with no Wi-Fi setup.
  fields:
    type:
      value: IP101
      locked: true
    mdc_pin:
      value: GPIO23
      locked: true
    mdio_pin:
      value: GPIO18
      locked: true
    clk:
      value:
        pin: GPIO0
        mode: CLK_EXT_IN
      locked: true
    phy_addr:
      value: 1
      locked: true
    power_pin:
      value: GPIO5
      locked: true
pins:
- gpio: 23
  label: GPIO23
  available: false
  occupied_by: Ethernet MDC
- gpio: 18
  label: GPIO18
  available: false
  occupied_by: Ethernet MDIO
- gpio: 0
  label: GPIO0
  available: false
  occupied_by: Ethernet CLK
- gpio: 5
  label: GPIO5
  available: false
  occupied_by: Ethernet Power
