id: lilygo_tdisplay_s3_touch
name: Lilygo TDisplay S3 Touch
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework: esp-idf
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Lilygo-TDisplay-S3-Touch/tdisplay-s3-touch.webp
pins:
- gpio: 0
  available: false
  occupied_by: Button 1
- gpio: 14
  available: false
  occupied_by: Button 2
- gpio: 16
  available: false
  occupied_by: my_touchscreen
- gpio: 17
  available: false
  occupied_by: i2c_onboard
- gpio: 18
  available: false
  occupied_by: i2c_onboard
- gpio: 21
  available: false
  occupied_by: my_touchscreen
- gpio: 38
  available: false
  occupied_by: backlight_output
docs_url: https://devices.esphome.io/devices/Lilygo-TDisplay-S3-Touch/
product_url: https://www.lilygo.cc/en-ca/products/t-display-s3
featured_components:
- id: i2c_onboard
  component_id: i2c
  fields:
    scl:
      value: 17
      locked: true
    sda:
      value: 18
      locked: true
    scan: false
    frequency: 400kHz
    id:
      value: i2c_onboard
      locked: true
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 0
        inverted: true
      locked: true
    id: binary_sensor_gpio_1
    name: Button 1
- id: binary_sensor_gpio_2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 14
        inverted: true
      locked: true
    id: binary_sensor_gpio_2
    name: Button 2
- id: display_mipi_spi_1
  component_id: display.mipi_spi
  fields:
    model: t-display-s3
    rotation: 270
    show_test_card: true
    id: display_mipi_spi_1
- id: led
  component_id: light.monochromatic
  fields:
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    output: backlight_output
    id: led
    name: LCD Backlight
- id: backlight_output
  component_id: output.ledc
  fields:
    frequency: 2000
    pin:
      value: 38
      locked: true
    id: backlight_output
- id: my_touchscreen
  component_id: touchscreen.cst816
  fields:
    interrupt_pin:
      value: 16
      locked: true
    reset_pin:
      value: 21
      locked: true
    skip_probe: false
    id: my_touchscreen
  requires:
  - i2c_onboard
featured_bundles:
- id: led_setup
  name: LCD Backlight (full setup)
  component_ids:
  - backlight_output
  - led
