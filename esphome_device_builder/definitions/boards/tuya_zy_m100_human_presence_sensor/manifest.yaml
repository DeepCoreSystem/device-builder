id: tuya_zy_m100_human_presence_sensor
name: Tuya ZY-M100 Human Presence Sensor
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework: esp-idf
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Tuya-ZY-M100-Human-Presence-Sensor/tuya-zy-m100.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Tuya-ZY-M100-Human-Presence-Sensor/test_board.jpg
pins:
- gpio: 20
  available: false
  occupied_by: uart
- gpio: 21
  available: false
  occupied_by: uart
docs_url: https://devices.esphome.io/devices/Tuya-ZY-M100-Human-Presence-Sensor/
featured_components:
- id: uart_bus
  component_id: uart
  fields:
    rx_pin:
      value: 20
      locked: true
    tx_pin:
      value: 21
      locked: true
    baud_rate: 115200
- id: tuya_hub
  component_id: tuya
  fields: {}
  requires:
  - uart_bus
- id: binary_sensor_tuya_1
  component_id: binary_sensor.tuya
  fields:
    sensor_datapoint: 1
    device_class: occupancy
    id: binary_sensor_tuya_1
    name: Presence State
  requires:
  - uart_bus
  - tuya_hub
- id: restart_device
  component_id: button.restart
  fields:
    entity_category: diagnostic
    id: restart_device
    name: Restart
- id: restart_device_safe_mode
  component_id: button.safe_mode
  fields:
    entity_category: diagnostic
    id: restart_device_safe_mode
    name: Restart (Safe Mode)
- id: number_tuya_1
  component_id: number.tuya
  fields:
    number_datapoint: 2
    min_value: 0
    max_value: 9
    step: 1
    icon: mdi:ray-vertex
    id: number_tuya_1
    name: Sensitivity
  requires:
  - uart_bus
  - tuya_hub
- id: number_tuya_2
  component_id: number.tuya
  fields:
    number_datapoint: 3
    min_value: 0
    max_value: 1000
    step: 1
    mode: slider
    unit_of_measurement: cm
    icon: mdi:signal-distance-variant
    id: number_tuya_2
    name: Near Detection
  requires:
  - uart_bus
  - tuya_hub
- id: number_tuya_3
  component_id: number.tuya
  fields:
    number_datapoint: 4
    min_value: 0
    max_value: 1000
    step: 1
    mode: slider
    unit_of_measurement: cm
    icon: mdi:signal-distance-variant
    id: number_tuya_3
    name: Far Detection
  requires:
  - uart_bus
  - tuya_hub
- id: number_tuya_4
  component_id: number.tuya
  fields:
    number_datapoint: 101
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: s
    mode: slider
    icon: mdi:clock
    id: number_tuya_4
    name: Detection Delay
  requires:
  - uart_bus
  - tuya_hub
- id: number_tuya_5
  component_id: number.tuya
  fields:
    number_datapoint: 102
    min_value: 0
    max_value: 1500
    step: 1
    unit_of_measurement: s
    mode: slider
    icon: mdi:clock
    id: number_tuya_5
    name: Fading Time
  requires:
  - uart_bus
  - tuya_hub
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    internal: true
    id: sensor_wifi_signal_1
    name: Signal strength
- id: uptime_sensor
  component_id: sensor.uptime
  fields:
    update_interval: 360s
    id: uptime_sensor
    name: Uptime
- id: light_intensity
  component_id: sensor.tuya
  fields:
    sensor_datapoint: 104
    unit_of_measurement: lux
    icon: mdi:brightness-5
    device_class: illuminance
    state_class: measurement
    id: light_intensity
    name: Light Intensity
  requires:
  - uart_bus
  - tuya_hub
- id: target_distance
  component_id: sensor.tuya
  fields:
    sensor_datapoint: 9
    unit_of_measurement: cm
    icon: mdi:eye
    device_class: distance
    state_class: measurement
    id: target_distance
    name: Target Distance
  requires:
  - uart_bus
  - tuya_hub
