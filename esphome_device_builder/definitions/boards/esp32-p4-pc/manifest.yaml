id: esp32-p4-pc
name: OLIMEX ESP32-P4-PC
description: Olimex ESP32-P4-PC with ESP32-P4NRW32 (16MB flash, 32MB PSRAM), 10/100 Ethernet (IP101 PHY), MIPI CSI camera and DSI display interfaces, HDMI output, and microSD. The ESP32-P4 has no built-in wireless; Ethernet provides networking.
manufacturer: OLIMEX
images:
- https://www.olimex.com/Products/IoT/ESP32-P4/ESP32-P4-PC/images/thumbs/310x230/ESP32-P4-PC-1.jpg
esphome:
  platform: esp32
  board: esp32-p4
  variant: esp32p4
  framework: esp-idf
hardware:
  flash_size: 16MB
  cpu_frequency: 400MHz
  connectivity:
  - ethernet
tags:
- dev-kit
- sd-card
docs_url: https://esphome.io/components/ethernet.html
product_url: https://www.olimex.com/Products/IoT/ESP32-P4/ESP32-P4-PC/open-source-hardware
featured_components:
- id: onboard_ethernet
  component_id: ethernet
  name: Onboard Ethernet
  description: Built-in IP101 Ethernet PHY (RMII) — wired networking, no wireless co-processor needed.
  fields:
    type:
      value: IP101
      locked: true
    mdc_pin:
      value: GPIO31
      locked: true
    mdio_pin:
      value: GPIO52
      locked: true
    clk:
      value:
        pin: GPIO50
        mode: CLK_EXT_IN
      locked: true
    phy_addr:
      value: 1
      locked: true
    power_pin:
      value: GPIO51
      locked: true
