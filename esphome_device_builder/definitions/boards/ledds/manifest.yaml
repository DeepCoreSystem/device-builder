id: ledds
name: LEDDs v2
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework: esp-idf
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/LEDDs/ledds-on-front-1440p.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/LEDDs/enclosure-pcb-side-angle-1440p.jpg
pins:
- gpio: 2
  available: false
  occupied_by: led2
- gpio: 3
  available: false
  occupied_by: ac_dimmer_output
- gpio: 4
  available: false
  occupied_by: Knob
- gpio: 5
  available: false
  occupied_by: Knob
- gpio: 6
  available: false
  occupied_by: led1
- gpio: 7
  available: false
  occupied_by: ac_dimmer_output
- gpio: 8
  available: false
  occupied_by: led3
- gpio: 9
  available: false
  occupied_by: Knob button
docs_url: https://devices.esphome.io/devices/LEDDs/
product_url: https://github.com/VasilKalchev/LEDDs
featured_components:
- id: rotary_encoder_btn_sensor
  component_id: binary_sensor.gpio
  fields:
    internal: true
    pin:
      value:
        number: 9
        inverted: true
        ignore_strapping_warning: true
      locked: true
    entity_category: diagnostic
    use_interrupt: true
    interrupt_type: ANY
    filters:
      value:
      - delayed_on_off: 10 ms
      locked: true
    id: rotary_encoder_btn_sensor
    name: Knob button
- id: restart_button
  component_id: button.restart
  fields:
    entity_category: config
    device_class: restart
    id: restart_button
    name: Restart
- id: dimmer_light
  component_id: light.monochromatic
  fields:
    icon: mdi:lightbulb-variant
    default_transition_length: 300 ms
    gamma_correct: 2.2
    restore_mode: ALWAYS_OFF
    effects:
      value:
      - pulse:
          name: Pulse (low, fast)
          transition_length: 4s
          update_interval: 4s
          min_brightness: 1%
          max_brightness: 50%
      - pulse:
          name: Pulse (low, slow)
          transition_length: 7s
          update_interval: 7s
          min_brightness: 1%
          max_brightness: 50%
      - pulse:
          name: Pulse (high, fast)
          transition_length: 4s
          update_interval: 4s
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: Pulse (high, slow)
          transition_length: 7s
          update_interval: 7s
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: Pulse (full, fast)
          transition_length: 3s
          update_interval: 3s
          min_brightness: 1%
          max_brightness: 100%
      - pulse:
          name: Pulse (full, slow)
          transition_length: 10s
          update_interval: 10s
          min_brightness: 1%
          max_brightness: 100%
      - flicker:
          name: Flicker (soft)
          alpha: 85%
          intensity: 3%
      - flicker:
          name: Flicker (intense)
          alpha: 85%
          intensity: 4%
      locked: true
    output: ac_dimmer_output
    id: dimmer_light
    name: Bulb
- id: red_led
  component_id: light.monochromatic
  fields:
    icon: mdi:led-outline
    entity_category: config
    default_transition_length: 1000 ms
    restore_mode: RESTORE_DEFAULT_ON
    initial_state:
      value:
        state: true
        brightness: 100 %
      locked: true
    output: led1
    id: red_led
    name: 'LED: red'
- id: blue_led
  component_id: light.monochromatic
  fields:
    icon: mdi:led-outline
    entity_category: config
    default_transition_length: 1000 ms
    restore_mode: RESTORE_DEFAULT_ON
    initial_state:
      value:
        state: true
        brightness: 100 %
      locked: true
    output: led2
    id: blue_led
    name: 'LED: blue'
- id: white_led
  component_id: light.monochromatic
  fields:
    icon: mdi:led-outline
    entity_category: config
    default_transition_length: 1000 ms
    restore_mode: RESTORE_DEFAULT_ON
    initial_state:
      value:
        state: true
        brightness: 100 %
      locked: true
    output: led3
    id: white_led
    name: 'LED: white'
- id: blue_status_led
  component_id: light.status_led
  fields:
    pin:
      value:
        number: 6
        allow_other_uses: true
      locked: true
    id: blue_status_led
    name: blue_status_led
- id: ac_dimmer_output
  component_id: output.ac_dimmer
  fields:
    gate_pin:
      value:
        number: 7
        inverted: true
      locked: true
    zero_cross_pin:
      value:
        number: 3
        inverted: false
        mode:
          input: true
      locked: true
    method: trailing
    init_with_half_cycle: true
    zero_means_zero: true
    min_power: 15 %
    max_power: 100 %
    id: ac_dimmer_output
- id: led1
  component_id: output.ledc
  fields:
    pin:
      value:
        number: 6
        allow_other_uses: true
      locked: true
    frequency: 200 Hz
    id: led1
- id: led2
  component_id: output.ledc
  fields:
    frequency: 200 Hz
    pin:
      value:
        number: 2
        ignore_strapping_warning: true
      locked: true
    id: led2
- id: led3
  component_id: output.ledc
  fields:
    frequency: 200 Hz
    pin:
      value:
        number: 8
        ignore_strapping_warning: true
      locked: true
    id: led3
- id: rotary_encoder_sensor
  component_id: sensor.rotary_encoder
  fields:
    icon: mdi:knob
    internal: true
    pin_a:
      value: 5
      locked: true
    pin_b:
      value: 4
      locked: true
    min_value: -1
    max_value: 1
    publish_initial_value: true
    restore_mode: ALWAYS_ZERO
    filters:
      value:
      - debounce: 20 ms
      locked: true
    id: rotary_encoder_sensor
    name: Knob
- id: text_sensor_version_1
  component_id: text_sensor.version
  fields:
    hide_timestamp: true
    id: text_sensor_version_1
    name: ESPHome version
featured_bundles:
- id: dimmer_light_setup
  name: Bulb (full setup)
  component_ids:
  - ac_dimmer_output
  - dimmer_light
- id: red_led_setup
  name: 'LED: red (full setup)'
  component_ids:
  - led1
  - red_led
- id: blue_led_setup
  name: 'LED: blue (full setup)'
  component_ids:
  - led2
  - blue_led
- id: white_led_setup
  name: 'LED: white (full setup)'
  component_ids:
  - led3
  - white_led
source:
  type: esphome-devices
  remote_id: LEDDs
  upstream_url: https://github.com/esphome/devices.esphome.io/blob/main/src/docs/devices/LEDDs/index.md
  upstream_revision: a3fac0e48920548cbdce5fc00cb8b05571b4d83e
  content_hash: f596f4db92842e67c67c2594c229a672d4cd331f6c4e1ac588406ab90497146e
