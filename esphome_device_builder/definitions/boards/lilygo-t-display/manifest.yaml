id: lilygo-t-display
name: LILYGO T-Display
description: >-
  LILYGO T-Display (TTGO T-Display): an ESP32-WROOM-32 board with a 1.14" 135x240
  ST7789 SPI display and two buttons. Display CS (GPIO5) and Button 1 (GPIO0) are
  ESP32 strapping pins, handled with ignore_strapping_warning.
manufacturer: LILYGO
esphome:
  platform: esp32
  board: lilygo-t-display
  variant: esp32
  framework: esp-idf
hardware:
  flash_size: 16MB
  connectivity:
  - wifi
  - bluetooth
tags:
- display
images:
- https://raw.githubusercontent.com/Xinyuan-LilyGO/TTGO-T-Display/master/image/image4.jpg
docs_url: https://github.com/Xinyuan-LilyGO/TTGO-T-Display
pins:
- gpio: 0
  available: false
  occupied_by: button_1
  notes: Button 1 (strapping pin, active low)
- gpio: 4
  available: false
  occupied_by: backlight_output
  notes: Display backlight
- gpio: 5
  available: false
  occupied_by: lcd_display
  notes: Display CS (strapping pin)
- gpio: 16
  available: false
  occupied_by: lcd_display
  notes: Display DC
- gpio: 18
  available: false
  occupied_by: lcd_spi
  features:
  - spi_clk
  notes: Display SPI SCLK
- gpio: 19
  available: false
  occupied_by: lcd_spi
  features:
  - spi_mosi
  notes: Display SPI MOSI
- gpio: 23
  available: false
  occupied_by: lcd_display
  notes: Display reset
- gpio: 35
  available: false
  occupied_by: button_2
  notes: Button 2 (input only, active low)
featured_components:
- id: lcd_spi
  component_id: spi
  fields:
    clk_pin:
      value: 18
      locked: true
    mosi_pin:
      value: 19
      locked: true
    id:
      value: lcd_spi
      locked: true
- id: lcd_display
  component_id: display.mipi_spi
  fields:
    model: T-DISPLAY
    spi_id:
      value: lcd_spi
      locked: true
    cs_pin:
      value:
        number: 5
        ignore_strapping_warning: true
      locked: true
    dc_pin:
      value: 16
      locked: true
    reset_pin:
      value: 23
      locked: true
    show_test_card: true
    id: lcd_display
  requires:
  - lcd_spi
- id: backlight_output
  component_id: output.ledc
  fields:
    pin:
      value: 4
      locked: true
    frequency: 1000Hz
    id: backlight_output
- id: display_backlight
  component_id: light.monochromatic
  fields:
    name: Display Backlight
    icon: mdi:brightness-7
    restore_mode: ALWAYS_ON
    output: backlight_output
    id: display_backlight
  requires:
  - backlight_output
- id: button_1
  component_id: binary_sensor.gpio
  fields:
    name: Button 1
    pin:
      value:
        number: 0
        inverted: true
        ignore_strapping_warning: true
      locked: true
    id: button_1
- id: button_2
  component_id: binary_sensor.gpio
  fields:
    name: Button 2
    pin:
      value:
        number: 35
        inverted: true
      locked: true
    id: button_2
featured_bundles:
- id: display_setup
  name: Display (full setup)
  component_ids:
  - lcd_spi
  - lcd_display
  - backlight_output
  - display_backlight
- id: buttons_setup
  name: Buttons (full setup)
  component_ids:
  - button_1
  - button_2
