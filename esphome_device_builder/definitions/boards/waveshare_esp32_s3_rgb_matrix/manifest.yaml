id: waveshare_esp32_s3_rgb_matrix
name: Waveshare ESP32-S3 RGB Matrix Driver Board
description: Waveshare HUB75 RGB-matrix driver board with an ESP32-S3-N32R16 (32MB flash,
  16MB PSRAM) — drives external Waveshare Matrix-RGB panels of any size over the HUB75 connector.
  Onboard QMI8658 6-axis IMU, SHTC3 temperature/humidity sensor, PCF85063 RTC with battery
  connector, ES8311 + ES7210 audio codec with dual microphones and speaker connector, microSD
  slot, USB-C port.
manufacturer: Waveshare
images:
- https://www.waveshare.com/media/catalog/product/cache/1/image/800x800/9df78eab33525d08d6e5fb8d27136e95/e/s/esp32-s3-rgb-matrix-1.jpg
esphome:
  platform: esp32
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework: esp-idf
hardware:
  flash_size: 32MB
  cpu_frequency: 240MHz
  connectivity:
  - wifi
  - bluetooth
tags:
- display
- sd-card
- usb-c
- imu
- microphone
docs_url: https://www.waveshare.com/wiki/ESP32-S3-RGB-Matrix
product_url: https://www.waveshare.com/esp32-s3-rgb-matrix.htm
featured_components:
- id: matrix_display
  component_id: display.hub75
  name: HUB75 RGB matrix output
  description: The board's HUB75 connector for Waveshare Matrix-RGB panels — pins are fixed
    by the PCB; set panel_width/panel_height to match the attached panel.
  fields:
    r1_pin:
      value: GPIO4
      locked: true
    g1_pin:
      value: GPIO5
      locked: true
    b1_pin:
      value: GPIO6
      locked: true
    r2_pin:
      value: GPIO7
      locked: true
    g2_pin:
      value: GPIO15
      locked: true
    b2_pin:
      value: GPIO16
      locked: true
    a_pin:
      value: GPIO18
      locked: true
    b_pin:
      value: GPIO8
      locked: true
    c_pin:
      value: GPIO3
      locked: true
    d_pin:
      value: GPIO42
      locked: true
    e_pin:
      value: GPIO9
      locked: true
    lat_pin:
      value: GPIO40
      locked: true
    oe_pin:
      value: GPIO2
      locked: true
    clk_pin:
      value: GPIO41
      locked: true
    panel_width:
      value: 64
      locked: false
    panel_height:
      value: 64
      locked: false
