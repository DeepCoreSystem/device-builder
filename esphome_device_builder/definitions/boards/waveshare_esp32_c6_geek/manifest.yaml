id: waveshare_esp32_c6_geek
name: Waveshare ESP32-C6-GEEK
description: USB-stick style ESP32-C6 development board (Wi-Fi 6 + BLE 5, 16MB flash) with
  a built-in USB-A plug, onboard 1.14in 240x135 ST7789 LCD, microSD slot sharing the LCD SPI
  bus, BOOT/user button, and UART / GPIO / I2C headers.
manufacturer: Waveshare
images:
- https://www.waveshare.com/media/catalog/product/cache/1/image/800x800/9df78eab33525d08d6e5fb8d27136e95/e/s/esp32-c6-geek-1.jpg
esphome:
  platform: esp32
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework: esp-idf
hardware:
  flash_size: 16MB
  cpu_frequency: 160MHz
  connectivity:
  - wifi
  - bluetooth
tags:
- compact
- display
- sd-card
docs_url: https://www.waveshare.com/wiki/ESP32-C6-GEEK
product_url: https://www.waveshare.com/esp32-c6-geek.htm
featured_components:
- id: spi_bus
  component_id: spi
  name: Onboard SPI bus
  description: SPI bus wired to the onboard 1.14in LCD and the microSD slot.
  fields:
    clk_pin:
      value: GPIO1
      locked: true
    mosi_pin:
      value: GPIO2
      locked: true
- id: onboard_display
  component_id: display.st7789v
  name: Onboard 1.14in LCD
  description: 240x135 ST7789 LCD on the onboard SPI bus. Pin mapping follows the community-verified
    ESPHome config for this board.
  requires:
  - spi_bus
  fields:
    model:
      value: CUSTOM
      locked: false
    cs_pin:
      value: GPIO5
      locked: true
    dc_pin:
      value: GPIO3
      locked: true
    reset_pin:
      value: GPIO4
      locked: true
    backlight_pin:
      value: GPIO6
      locked: true
    width:
      value: 240
      locked: false
    height:
      value: 135
      locked: false
    offset_width:
      value: 40
      locked: false
    offset_height:
      value: 52
      locked: false
default_components:
- spi_bus
- onboard_display
