id: blitzwolf_bw_shp8_power_monitoring_wall_outlet
name: BlitzWolf BW-SHP8 Power Monitoring Wall Outlet
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- images/BlitzWolf-BW-SHP8-Power-Monitoring-Wall-Outlet.jpg
tags:
- relay
- compact
pins:
- gpio: 1
  available: false
  occupied_by: output.esp8266_pwm (state_led)
- gpio: 3
  available: false
  occupied_by: binary_sensor.gpio (button)
- gpio: 4
  available: false
  occupied_by: sensor.hlw8012
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: sensor.hlw8012
- gpio: 14
  available: false
  occupied_by: switch.gpio ($hostname power)
docs_url: https://devices.esphome.io/devices/BlitzWolf-BW-SHP8-Power-Monitoring-Wall-Outlet/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 3
        inverted: true
        mode: INPUT_PULLUP
      locked: true
    id: binary_sensor_gpio_1
    name: Gpio 1
- id: light_monochromatic_1
  component_id: light.monochromatic
  fields:
    output: state_led
    id: light_monochromatic_1
    name: Monochromatic 1
- id: output_esp8266_pwm_1
  component_id: output.esp8266_pwm
  fields:
    pin:
      value:
        number: 1
        inverted: true
      locked: true
    id: output_esp8266_pwm_1
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    model: BL0937
    current_resistor: $current_resistor
    voltage_divider: $voltage_divider
    change_mode_every: 2
    update_interval: 2s
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 4
      locked: true
    cf1_pin:
      value: 5
      locked: true
    id: sensor_hlw8012_1
    name: Hlw8012 1
- id: sensor_template_1
  component_id: sensor.template
  fields:
    unit_of_measurement: VA
    accuracy_decimals: 3
    lambda: return id(voltage).state * id(current).state;
    id: sensor_template_1
    name: $hostname apparent power
- id: sensor_template_2
  component_id: sensor.template
  fields:
    unit_of_measurement: VAr
    accuracy_decimals: 3
    id: sensor_template_2
    name: $hostname reactive power
- id: sensor_template_3
  component_id: sensor.template
  fields:
    accuracy_decimals: 1
    id: sensor_template_3
    name: $hostname power factor
- id: switch_gpio_1
  component_id: switch.gpio
  fields:
    pin:
      value: 14
      locked: true
    restore_mode: $restore_mode
    icon: mdi:power-socket-de
    id: switch_gpio_1
    name: $hostname power
source:
  type: esphome-devices
  remote_id: BlitzWolf-BW-SHP8-Power-Monitoring-Wall-Outlet
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/BlitzWolf-BW-SHP8-Power-Monitoring-Wall-Outlet/index.md
  upstream_revision: 7fa250835bc3d3a2b319dced285d5e0c27171bd1
  content_hash: 73f36aed57c85c8df97441af397c9089df8d287e05d20e8c79766de8c4aa44bc
