id: lanbon_l9
name: Lanbon L9 Smart Light Switch
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework: esp-idf
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Lanbon-L9/lanbon-l9.jpeg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Lanbon-L9/lanbon-l9-header.png
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Lanbon-L9/lanbon-l9-esphome.png
pins:
- gpio: 4
  available: false
  occupied_by: my_display
- gpio: 5
  available: false
  occupied_by: Power
- gpio: 11
  available: false
  occupied_by: Proximity Sensor
- gpio: 17
  available: false
  occupied_by: my_display
- gpio: 36
  available: false
  occupied_by: Relay
- gpio: 42
  available: false
  occupied_by: lcd_backlight_output
docs_url: https://devices.esphome.io/devices/Lanbon-L9/
featured_components:
- id: proximity_sensor
  component_id: binary_sensor.gpio
  fields:
    pin:
      value: 11
      locked: true
    id: proximity_sensor
    name: Proximity Sensor
- id: my_display
  component_id: display.mipi_spi
  fields:
    model: st7789v
    bus_mode: octal
    dc_pin:
      value: 17
      locked: true
    reset_pin:
      value: 4
      locked: true
    invert_colors: true
    show_test_card: true
    data_rate: 4MHz
    color_depth: 16BIT
    color_order: BGR
    auto_clear_enabled: false
    update_interval: 250ms
    id: my_display
    name: my_display
- id: display_backlight
  component_id: light.monochromatic
  fields:
    restore_mode: ALWAYS_ON
    output: lcd_backlight_output
    id: display_backlight
    name: Display Backlight
- id: lcd_backlight_output
  component_id: output.ledc
  fields:
    pin:
      value:
        number: 42
        inverted: false
      locked: true
    id: lcd_backlight_output
- id: power_pulse_meter
  component_id: sensor.pulse_meter
  fields:
    pin:
      value: 5
      locked: true
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    internal_filter_mode: PULSE
    accuracy_decimals: 1
    id: power_pulse_meter
    name: Power
- id: relay
  component_id: switch.gpio
  fields:
    pin:
      value:
        number: 36
      locked: true
    id: relay
    name: Relay
- id: my_touchscreen
  component_id: touchscreen.ft63x6
  fields:
    display: my_display
    id: my_touchscreen
    name: my_touchscreen
featured_bundles:
- id: display_backlight_setup
  name: Display Backlight (full setup)
  component_ids:
  - lcd_backlight_output
  - display_backlight
- id: my_touchscreen_setup
  name: my_touchscreen (full setup)
  component_ids:
  - my_display
  - my_touchscreen
source:
  type: esphome-devices
  remote_id: Lanbon-L9
  upstream_url: https://github.com/esphome/devices.esphome.io/blob/main/src/docs/devices/Lanbon-L9/index.md
  upstream_revision: c5d3c291760d8e2d9909f54b1b491aacfc59740e
