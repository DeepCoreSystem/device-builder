- gpio: 46
  available: false
  occupied_by: display_spi
docs_url: https://devices.esphome.io/devices/Lanbon-L9/
featured_components:
- id: display_spi
  component_id: spi
  fields:
    type: octal
    clk_pin:
      value: 21
      locked: true
    data_pins:
      value:
      - 6
      - 7
      - 15
      - 16
      - 10
      - 9
      - 46
      - 3
      locked: true
    id:
      value: display_spi
      locked: true
- id: touchscreen_i2c
  component_id: i2c
  fields:
    scl:
      value:
        number: 0
        ignore_strapping_warning: true
      locked: true
    sda:
      value:
        number: 35
      locked: true
    id:
      value: touchscreen_i2c
      locked: true
- id: proximity_sensor
  component_id: binary_sensor.gpio
  fields:
    pin:
      value: 11
      locked: true
    id: proximity_sensor
    name: Proximity Sensor
- id: my_display
  component_id: display.mipi_spi
  fields:
    model: st7789v
    bus_mode: octal
    dc_pin:
      value: 17
      locked: true
    reset_pin:
      value: 4
      locked: true
    invert_colors: true
    show_test_card: true
    data_rate: 4MHz
    color_depth: 16BIT
    color_order: BGR
    auto_clear_enabled: false
    update_interval: 250ms
    id: my_display
  requires:
  - display_spi
- id: display_backlight
  component_id: light.monochromatic
  fields:
    restore_mode: ALWAYS_ON
    output: lcd_backlight_output
    id: display_backlight
    name: Display Backlight
- id: lcd_backlight_output
  component_id: output.ledc
  fields:
    pin:
      value:
        number: 42
        inverted: false
      locked: true
    id: lcd_backlight_output
- id: power_pulse_meter
  component_id: sensor.pulse_meter
  fields:
    pin:
      value: 5
      locked: true
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    internal_filter_mode: PULSE
    accuracy_decimals: 1
    id: power_pulse_meter
    name: Power
- id: relay
  component_id: switch.gpio
  fields:
    pin:
      value:
        number: 36
      locked: true
    id: relay
    name: Relay
- id: my_touchscreen
  component_id: touchscreen.ft63x6
  fields:
    display: my_display
    id: my_touchscreen
  requires:
  - touchscreen_i2c
featured_bundles:
- id: display_backlight_setup
  name: Display Backlight (full setup)
  component_ids:
  - lcd_backlight_output
  - display_backlight
- id: my_touchscreen_setup
  name: my_touchscreen (full setup)
  component_ids:
  - display_spi
  - touchscreen_i2c
  - my_display
  - my_touchscreen
