- gpio: 7
  available: false
  occupied_by: display_spi
- gpio: 9
  available: false
  occupied_by: display_spi
- gpio: 10
  available: false
  occupied_by: display_spi
- gpio: 11
  available: false
  occupied_by: Proximity Sensor
- gpio: 15
  available: false
  occupied_by: display_spi
- gpio: 16
  available: false
  occupied_by: display_spi
- gpio: 17
  available: false
  occupied_by: my_display
- gpio: 21
  available: false
  occupied_by: display_spi
- gpio: 35
  available: false
  occupied_by: touchscreen_i2c
- gpio: 36
  available: false
  occupied_by: Relay
- gpio: 42
