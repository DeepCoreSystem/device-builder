id: waveshare_esp32_s3_nano
name: Waveshare ESP32-S3-Nano
description: |
  Arduino Nano form factor board with ESP32-S3, USB-C, 16 MB flash, 8 MB PSRAM.
  Has 3 LED (red, green, blue) in one housing and an additional single LED.
manufacturer: Waveshare

esphome:
  platform: esp32
  variant: esp32s3
  board: arduino_nano_esp32
  framework: esp-idf

hardware:
  cpu_frequency: 240MHz
  flash_size: 16MB
  ram_size: 524288  # bytes
  connectivity:
    - wifi
    - bluetooth

docs_url: "https://esphome.io/components/esp32.html"
product_url: "https://www.waveshare.com/wiki/ESP32-S3-Nano"
is_generic: false

images:
  - https://www.waveshare.com/media/catalog/product/cache/1/image/800x800/9df78eab33525d08d6e5fb8d27136e95/e/s/esp32-s3-nano-1.jpg

tags:
  - usb-c
  - compact
  - rgb-led

default_components:
  - id: psram
    fields:
      mode: octal
      speed: 80MHz
      ignore_not_found: false

featured_components:
  - id: status_led
    component_id: light.status_led
    name: Onboard single status LED
    description: Onboard red LED connected to GPIO48/D13
    fields:
      pin: GPIO48

  - id: mcu_temperature
    component_id: sensor.internal_temperature
    name: Internal MCU Temperature
    description: This allows you to use the integrated temperature sensor of the ESP32 chip.
    fields:
      name: Internal MCU Temperature
      id: mcu_temperature
      icon: mdi:cpu-32-bit
      entity_category: diagnostic
      disabled_by_default: true
      device_class: temperature
      unit_of_measurement: °C
      accuracy_decimals: 1

  - id: restart_button
    component_id: button.restart
    name: Restart button
    description: Allows you to restart your node remotely through Home Assistant.
    fields:
      name: Restart
      entity_category: config

  - id: reset_button
    component_id: button.factory_reset
    name: Factory reset
    description: Allows you to remotely invalidate (reset) all preferences stored in flash memory.
    fields:
      name: Restart with Factory Default Settings
      entity_category: config
      disabled_by_default: true

  - id: red_channel
    component_id: output.ledc
    name: Red channel
    fields:
      pin: GPIO46
      id: red_channel_id

  - id: green_channel
    component_id: output.ledc
    name: Green channel
    fields:
      pin: GPIO0
      id: green_channel_id

  - id: blue_channel
    component_id: output.ledc
    name: Blue channel
    fields:
      pin: GPIO45
      id: blue_channel_id

  - id: rgb_status
    component_id: light.rgb
    name: RGB LED
    fields:
      red: red_channel_id
      green: green_channel_id
      blue: blue_channel_id

featured_bundles:
  - id: rgb_status_led
    name: Onboard status LED (RGB)
    description: Onboard RGB status LED
    component_ids: [rgb_status, red_channel, green_channel, blue_channel]

pins:
  - gpio: 0
    label: B1
    features: [strapping, rgb_led]
    available: true
    occupied_by: "Onboard RGB LED (green channel)"
    notes: "Strapping pin, can still be used, but LED will reflect state"

