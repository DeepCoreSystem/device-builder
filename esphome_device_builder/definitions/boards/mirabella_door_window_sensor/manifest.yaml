id: mirabella_door_window_sensor
name: Mirabella Genio Door & Window Sensor
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
  logger_hardware_uart: UART1
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Mirabella-Door-Window-Sensor/Mirabella-Door-Window-Sensor.jpg
docs_url: https://devices.esphome.io/devices/Mirabella-Door-Window-Sensor/
featured_components:
- id: sensor_adc_1
  component_id: sensor.adc
  fields:
    update_interval: 1s
    pin:
      value: VCC
      locked: true
    filters:
      value:
      - calibrate_linear:
        - 2.8 -> 0.0
        - 3.6 -> 100
      locked: true
    unit_of_measurement: '%'
    accuracy_decimals: 0
    id: sensor_adc_1
    name: Doow Window Battery
source:
  type: esphome-devices
  remote_id: Mirabella-Door-Window-Sensor
