id: waveshare_esp32_s3_geek
name: Waveshare ESP32-S3-GEEK
description: >-
  Waveshare ESP32-S3-GEEK: an ESP32-S3 USB-stick development board with a 1.14" 135x240
  ST7789 SPI LCD, a microSD slot, a BOOT button, and I2C/UART/GPIO headers. The display
  backlight (GPIO7) is active-high. Display CS/DC/reset are supplied by the model.
manufacturer: Waveshare
esphome:
  platform: esp32
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework: esp-idf
hardware:
  flash_size: 16MB
  connectivity:
  - wifi
  - bluetooth
tags:
- display
docs_url: https://www.waveshare.com/wiki/ESP32-S3-GEEK
pins:
- gpio: 0
  available: false
  occupied_by: boot_button
  notes: BOOT button (strapping pin, active low)
- gpio: 7
  available: false
  occupied_by: backlight_output
  notes: Display backlight (active high)
- gpio: 8
  available: false
  occupied_by: lcd_display
  notes: Display DC
- gpio: 9
  available: false
  occupied_by: lcd_display
  notes: Display reset
- gpio: 10
  available: false
  occupied_by: lcd_display
  notes: Display CS
- gpio: 11
  available: false
  occupied_by: lcd_spi
  features:
  - spi_mosi
  notes: Display SPI MOSI
- gpio: 12
  available: false
  occupied_by: lcd_spi
  features:
  - spi_clk
  notes: Display SPI CLK
featured_components:
- id: lcd_spi
  component_id: spi
  fields:
    clk_pin:
      value: 12
      locked: true
    mosi_pin:
      value: 11
      locked: true
    id:
      value: lcd_spi
      locked: true
- id: lcd_display
  component_id: display.mipi_spi
  fields:
    model: WAVESHARE-ESP32-S3-GEEK
    spi_id:
      value: lcd_spi
      locked: true
    show_test_card: true
    id: lcd_display
  requires:
  - lcd_spi
- id: backlight_output
  component_id: output.ledc
  fields:
    pin:
      value: 7
      locked: true
    frequency: 1000Hz
    id: backlight_output
- id: display_backlight
  component_id: light.monochromatic
  fields:
    name: Display Backlight
    icon: mdi:brightness-7
    restore_mode: ALWAYS_ON
    output: backlight_output
    id: display_backlight
  requires:
  - backlight_output
- id: boot_button
  component_id: binary_sensor.gpio
  fields:
    name: BOOT Button
    pin:
      value:
        number: 0
        inverted: true
        ignore_strapping_warning: true
      locked: true
    id: boot_button
featured_bundles:
- id: display_setup
  name: Display (full setup)
  component_ids:
  - lcd_spi
  - backlight_output
  - display_backlight
  - lcd_display
