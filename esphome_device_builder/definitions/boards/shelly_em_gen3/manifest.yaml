id: shelly_em_gen3
name: Shelly EM Gen3
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework: esp-idf
  logger_hardware_uart: UART0
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Shelly-EM-Gen3/shelly_em_gen3.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Shelly-EM-Gen3/pcb_pinout_diagram.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Shelly-EM-Gen3/ct1.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Shelly-EM-Gen3/ct2.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Shelly-EM-Gen3/ct3.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Shelly-EM-Gen3/package_front.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Shelly-EM-Gen3/package_back.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Shelly-EM-Gen3/package_left.jpg
tags:
- shelly
pins:
- gpio: 0
  available: false
  occupied_by: Relay
- gpio: 1
  available: false
  occupied_by: Button
- gpio: 3
  available: false
  occupied_by: temp_analog_reading
- gpio: 4
  available: false
  occupied_by: ade7953_id
- gpio: 6
  available: false
  occupied_by: i2c
- gpio: 7
  available: false
  occupied_by: i2c
- gpio: 9
  available: false
  occupied_by: Status LED
- gpio: 18
  available: false
  occupied_by: Header GPIO
docs_url: https://devices.esphome.io/devices/Shelly-EM-Gen3/
featured_components:
- id: i2c_bus
  component_id: i2c
  fields:
    scl:
      value: 6
      locked: true
    sda:
      value: 7
      locked: true
    scan: true
- id: shelly_button_id
  component_id: binary_sensor.gpio
  fields:
    entity_category: diagnostic
    pin:
      value:
        number: 1
        inverted: true
        mode:
          input: true
          pullup: true
      locked: true
    filters:
      value:
      - settle: 10ms
      locked: true
    id: shelly_button_id
    name: Button
- id: binary_sensor_header_gpio_id
  component_id: binary_sensor.gpio
  fields:
    entity_category: diagnostic
    disabled_by_default: true
    pin:
      value:
        number: 18
        inverted: true
        mode:
          input: true
          pullup: true
      locked: true
    id: binary_sensor_header_gpio_id
    name: Header GPIO
- id: status_led_id
  component_id: light.status_led
  fields:
    disabled_by_default: true
    entity_category: diagnostic
    pin:
      value:
        number: 9
        inverted: true
        ignore_strapping_warning: true
      locked: true
    id: status_led_id
    name: Status LED
- id: temp_resistance_reading
  component_id: sensor.resistance
  fields:
    configuration: DOWNSTREAM
    resistor: 10kOhm
    sensor: temp_analog_reading
    id: temp_resistance_reading
    name: temp_resistance_reading
- id: temp_analog_reading
  component_id: sensor.adc
  fields:
    pin:
      value: 3
      locked: true
    attenuation: 12db
    id: temp_analog_reading
    name: temp_analog_reading
- id: ade7953_id
  component_id: sensor.ade7953_i2c
  fields:
    irq_pin:
      value: 4
      locked: true
    update_interval: 20s
    use_accumulated_energy_registers: true
    voltage_gain: 3327887
    current_gain_a: 4787125
    current_gain_b: 4819989
    id: ade7953_id
  requires:
  - i2c_bus
- id: relay_id
  component_id: switch.gpio
  fields:
    pin:
      value: 0
      locked: true
    id: relay_id
    name: Relay
featured_bundles:
- id: temp_resistance_reading_setup
  name: temp_resistance_reading (full setup)
  component_ids:
  - temp_analog_reading
  - temp_resistance_reading
source:
  type: esphome-devices
  remote_id: Shelly-EM-Gen3
  upstream_url: https://github.com/esphome/devices.esphome.io/blob/main/src/docs/devices/Shelly-EM-Gen3/index.md
