id: shelly_plus_1pm
name: Shelly Plus 1PM
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
  framework: esp-idf
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- images/shelly_plus_1pm_pinout.jpg
tags:
- relay
- shelly
pins:
- gpio: 4
  available: false
  occupied_by: binary_sensor.gpio (${device_name} Switch)
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 18
  available: false
  occupied_by: sensor.hlw8012
- gpio: 23
  available: false
