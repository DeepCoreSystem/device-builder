id: blitzwolf_bw_shp2_power_monitoring_plug
name: BlitzWolf BW-SHP2 Power Monitoring Plug
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/BlitzWolf-BW-SHP2-Power-Monitoring-Plug/BlitzWolf-BW-SHP2-Power-Monitoring-Plug.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/BlitzWolf-BW-SHP2-Power-Monitoring-Plug/BlitzWolf-BW-SHP2-Power-Monitoring-Plug-Back.jpg
tags:
- relay
- compact
pins:
- gpio: 0
  available: false
  occupied_by: blitzwolf_bw_shp2_plug_1_blue_output
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: sensor.hlw8012
- gpio: 13
  available: false
  occupied_by: BlitzWolf BW-SHP2 Plug 1 Button
- gpio: 14
  available: false
  occupied_by: sensor.hlw8012
- gpio: 15
  available: false
  occupied_by: BlitzWolf BW-SHP2 Plug 1
docs_url: https://devices.esphome.io/devices/BlitzWolf-BW-SHP2-Power-Monitoring-Plug/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    device_class: power
    pin:
      value:
        number: 13
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: binary_sensor_gpio_1
    name: BlitzWolf BW-SHP2 Plug 1 Button
- id: blitzwolf_bw_shp2_plug_1_blue_led
  component_id: light.monochromatic
  fields:
    output: blitzwolf_bw_shp2_plug_1_blue_output
    id: blitzwolf_bw_shp2_plug_1_blue_led
    name: BlitzWolf BW-SHP2 Plug 1 Light
- id: blitzwolf_bw_shp2_plug_1_blue_output
  component_id: output.esp8266_pwm
  fields:
    pin:
      value:
        number: 0
        inverted: true
      locked: true
    id: blitzwolf_bw_shp2_plug_1_blue_output
- id: sensor_uptime_1
  component_id: sensor.uptime
  fields:
    filters:
      value:
      - lambda: return x / 60.0;
      locked: true
    unit_of_measurement: minutes
    id: sensor_uptime_1
    name: BlitzWolf BW-SHP2 Plug 1 Uptime
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: BlitzWolf BW-SHP2 Plug 1 Wifi Signal
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 5
      locked: true
    cf1_pin:
      value: 14
      locked: true
    change_mode_every: 8
    update_interval: 10s
    current_resistor: '0.00221'
    voltage_divider: '955'
    id: sensor_hlw8012_1
- id: relay
  component_id: switch.gpio
  fields:
    pin:
      value: 15
      locked: true
    restore_mode: RESTORE_DEFAULT_OFF
    id: relay
    name: BlitzWolf BW-SHP2 Plug 1
featured_bundles:
- id: blitzwolf_bw_shp2_plug_1_blue_led_setup
  name: BlitzWolf BW-SHP2 Plug 1 Light (full setup)
  component_ids:
  - blitzwolf_bw_shp2_plug_1_blue_output
  - blitzwolf_bw_shp2_plug_1_blue_led
source:
  type: esphome-devices
  remote_id: BlitzWolf-BW-SHP2-Power-Monitoring-Plug
