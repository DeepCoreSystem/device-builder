  component_id: sensor.wifi_signal
  fields:
    update_interval: 5min
    id: sensor_wifi_signal_1
    name: Wifi Signal 1
- id: switch_gpio_1
  component_id: switch.gpio
  fields:
    pin:
      value:
        number: 13
        inverted: true
      locked: true
    id: switch_gpio_1
    name: Gpio 1
- id: switch_gpio_2
  component_id: switch.gpio
  fields:
    pin:
      value: 14
      locked: true
    id: switch_gpio_2
    name: Gpio 2
- id: text_sensor_template_1
