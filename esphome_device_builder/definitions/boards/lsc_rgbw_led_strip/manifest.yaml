id: lsc_rgbw_led_strip
name: LSC-RGBW-LED-Strip
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/LSC-RGBW-LED-Strip/image.jpg
pins:
- gpio: 0
  available: false
  occupied_by: remote_receiver
- gpio: 4
  available: false
  occupied_by: pwm_red
- gpio: 12
  available: false
  occupied_by: pwm_green
- gpio: 13
  available: false
  occupied_by: pwm_white
- gpio: 14
  available: false
  occupied_by: pwm_blue
docs_url: https://devices.esphome.io/devices/LSC-RGBW-LED-Strip/
featured_components:
- id: remote_receiver_hub
  component_id: remote_receiver
  fields:
    pin:
      value:
        number: 0
        inverted: true
      locked: true
    dump: all
- id: aan
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    nec:
      value:
        address: 247
        command: 49215
      locked: true
    id: aan
    name: Remote On
  requires:
  - remote_receiver_hub
- id: uit
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    nec:
      value:
        address: 247
        command: 16575
      locked: true
    id: uit
    name: Remote Off
  requires:
  - remote_receiver_hub
- id: white
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    nec:
      value:
        address: 247
        command: 57375
      locked: true
    id: white
    name: Remote white
  requires:
  - remote_receiver_hub
- id: blue
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    nec:
      value:
        address: 247
        command: 24735
      locked: true
    id: blue
    name: Remote blue
  requires:
  - remote_receiver_hub
- id: red
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    nec:
      value:
        address: 247
        command: 8415
      locked: true
    id: red
    name: Remote red
  requires:
  - remote_receiver_hub
- id: green
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    nec:
      value:
        address: 247
        command: 41055
      locked: true
    id: green
    name: Remote green
  requires:
  - remote_receiver_hub
- id: strobe
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    nec:
      value:
        address: 247
        command: 61455
      locked: true
    id: strobe
    name: Remote Strobe
  requires:
  - remote_receiver_hub
- id: strip
  component_id: light.rgbw
  fields:
    red: pwm_red
    green: pwm_green
    blue: pwm_blue
    white: pwm_white
    id: strip
    name: lsc-rgbw-strip
- id: pwm_red
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 4
      locked: true
    frequency: 1000 Hz
    id: pwm_red
- id: pwm_blue
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 14
      locked: true
    frequency: 1000 Hz
    id: pwm_blue
- id: pwm_green
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 12
      locked: true
    frequency: 1000 Hz
    id: pwm_green
- id: pwm_white
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 13
      locked: true
    frequency: 1000 Hz
    id: pwm_white
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: lsc-rgbw-strip Wifi Signal Strength
featured_bundles:
- id: strip_setup
  name: lsc-rgbw-strip (full setup)
  component_ids:
  - pwm_red
  - pwm_green
  - pwm_blue
  - pwm_white
  - strip
source:
  type: esphome-devices
  remote_id: LSC-RGBW-LED-Strip
  upstream_url: https://github.com/esphome/devices.esphome.io/blob/main/src/docs/devices/LSC-RGBW-LED-Strip/index.md
  upstream_revision: a3fac0e48920548cbdce5fc00cb8b05571b4d83e
  content_hash: d49f23530f24a845c8248defe6a36b7c59f3f16df3c044879e348de85e1bed2f
