    unit_of_measurement: °C
    device_class: temperature
    accuracy_decimals: 1
    state_class: measurement
    icon: mdi:thermometer
    id: sensor_dallas_temp_1
    name: Temperature_1
- id: sensor_dallas_temp_2
  component_id: sensor.dallas_temp
  fields:
    update_interval: 30s
    address: (FILL IN ONE-WIRE BUS ADDRESS)
    unit_of_measurement: °C
    device_class: temperature
    accuracy_decimals: 1
    state_class: measurement
    icon: mdi:thermometer
    id: sensor_dallas_temp_2
    name: Temperature_2
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    unit_of_measurement: dBm
    accuracy_decimals: 0
    update_interval: 30s
    id: sensor_wifi_signal_1
    name: WiFi Signal Strength
- id: switch_gpio_1
  component_id: switch.gpio
  fields:
    pin:
      value: 15
      locked: true
    restore_mode: ALWAYS_OFF
    id: switch_gpio_1
    name: Gpio 1
