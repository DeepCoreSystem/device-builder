id: shelly_uni
name: Shelly Uni
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp_wroom_02
hardware:
  connectivity:
  - wifi
images:
- images/shelly_uni_625x625.webp
- images/shelly_uni_scheme-1536x717.jpg
- images/shelly_uni_gpio.jpg
tags:
- shelly
pins:
- gpio: 0
  available: false
  occupied_by: light.status_led (LED)
- gpio: 4
  available: false
  occupied_by: output.gpio (out_2)
- gpio: 12
  available: false
  occupied_by: binary_sensor.gpio (Input 1)
- gpio: 13
  available: false
  occupied_by: binary_sensor.gpio (Input 2)
- gpio: 14
  available: false
  occupied_by: switch.gpio (ADC Range)
- gpio: 15
  available: false
  occupied_by: output.gpio (out_1)
- gpio: 17
  available: false
  occupied_by: sensor.adc (Voltage)
docs_url: https://devices.esphome.io/devices/Shelly-Uni/
featured_components:
- id: binary_sensor_template_1
  component_id: binary_sensor.template
  fields:
    internal: true
    entity_category: diagnostic
    device_class: connectivity
    lambda: return global_api_server->is_connected();
    id: binary_sensor_template_1
    name: API connected
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 12
        mode: INPUT_PULLUP
        inverted: false
      locked: true
    id: binary_sensor_gpio_1
    name: Input 1
- id: binary_sensor_gpio_2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 13
        mode: INPUT_PULLUP
        inverted: false
      locked: true
    id: binary_sensor_gpio_2
    name: Input 2
- id: light_status_led_1
  component_id: light.status_led
  fields:
    pin:
      value:
        number: 0
        inverted: true
      locked: true
    internal: true
    restore_mode: ALWAYS_OFF
    id: light_status_led_1
    name: LED
- id: output_gpio_1
  component_id: output.gpio
  fields:
    pin:
      value:
        number: 15
        inverted: false
      locked: true
    id: output_gpio_1
- id: output_gpio_2
  component_id: output.gpio
  fields:
    pin:
      value:
        number: 4
        inverted: false
      locked: true
    id: output_gpio_2
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 90s
    entity_category: diagnostic
    id: sensor_wifi_signal_1
    name: RSSI
- id: sensor_adc_1
  component_id: sensor.adc
  fields:
    pin:
      value: 17
      locked: true
    accuracy_decimals: 1
    update_interval: 9s
    id: sensor_adc_1
    name: Voltage
- id: switch_output_1
  component_id: switch.output
  fields:
    output: out_1
    id: switch_output_1
    name: Output 1
- id: switch_output_2
  component_id: switch.output
  fields:
    output: out_2
    id: switch_output_2
    name: Output 2
- id: switch_gpio_1
  component_id: switch.gpio
  fields:
    pin:
      value: 14
      locked: true
    restore_mode: RESTORE_DEFAULT_ON
    id: switch_gpio_1
    name: ADC Range
source:
  type: esphome-devices
  remote_id: Shelly-Uni
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Shelly-Uni/index.md
  upstream_revision: 7fa250835bc3d3a2b319dced285d5e0c27171bd1
  content_hash: a833441233acef1c4d0ace94498f1f4a002c1603a05e14f0059b939785b07dbf
