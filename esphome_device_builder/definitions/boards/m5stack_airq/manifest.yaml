id: m5stack_airq
name: M5Stack AirQ
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32-s3-devkitc-1
  variant: esp32s3
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/M5Stack-AirQ/M5stack-AirQsensorDisplay.jpeg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/M5Stack-AirQ/M5stack-AirQ.webp
pins:
- gpio: 0
  available: false
  occupied_by: Button A
- gpio: 8
  available: false
  occupied_by: Button B
- gpio: 10
  available: false
  occupied_by: enable
- gpio: 11
  available: false
  occupied_by: bus_a
- gpio: 12
  available: false
  occupied_by: bus_a
- gpio: 21
  available: false
  occupied_by: LED
- gpio: 42
  available: false
  occupied_by: Button Power
- gpio: 46
  available: false
  occupied_by: Button Hold
docs_url: https://devices.esphome.io/devices/M5Stack-AirQ/
featured_components:
- id: bus_a
  component_id: i2c
  fields:
    sda:
      value: 11
      locked: true
    scl:
      value: 12
      locked: true
    scan: true
    frequency: 50kHz
    id:
      value: bus_a
      locked: true
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 0
        ignore_strapping_warning: true
        mode:
          input: true
        inverted: true
      locked: true
    id: binary_sensor_gpio_1
    name: Button A
- id: binary_sensor_gpio_2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 8
        mode:
          input: true
          pullup: true
        inverted: true
      locked: true
    id: binary_sensor_gpio_2
    name: Button B
- id: binary_sensor_gpio_3
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 46
        ignore_strapping_warning: true
      locked: true
    id: binary_sensor_gpio_3
    name: Button Hold
- id: binary_sensor_gpio_4
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 42
      locked: true
    id: binary_sensor_gpio_4
    name: Button Power
- id: id_led
  component_id: light.esp32_rmt_led_strip
  fields:
    rgb_order: GRB
    pin:
      value: 21
      locked: true
    num_leds: 1
    chipset: SK6812
    restore_mode: RESTORE_AND_OFF
    color_correct:
      value:
      - 20%
      - 20%
      - 20%
      locked: true
    id: id_led
    name: LED
- id: enable
  component_id: output.gpio
  fields:
    pin:
      value: 10
      locked: true
    id: enable
- id: uptime_sensor
  component_id: sensor.uptime
  fields:
    update_interval: 1s
    internal: true
    id: uptime_sensor
    name: Uptime
- id: sensor_scd4x_1
  component_id: sensor.scd4x
  fields:
    altitude_compensation: 0m
    address: 98
    update_interval: 60s
    id: sensor_scd4x_1
  requires:
  - bus_a
- id: wifi_signal_db
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    entity_category: diagnostic
    id: wifi_signal_db
    name: Wifi Signal dB
- id: sen55
  component_id: sensor.sen5x
  fields:
    temperature_compensation:
      value:
        offset: -3.0
        normalized_offset_slope: 0
        time_constant: 1200
      locked: true
    acceleration_mode: low
    store_baseline: true
    address: 105
    update_interval: 60s
    id: sen55
  requires:
  - bus_a
