id: sonoff-basic
name: Sonoff Basic
description: Sonoff Basic R1 smart relay switch with ESP8285, 10A relay, and mains power input. Flashable with ESPHome for
  local control. Popular entry point for smart home retrofitting.
manufacturer: Sonoff/ITEAD
esphome:
  platform: esp8266
  board: esp01_1m
  framework: arduino
hardware:
  flash_size: 1MB
  cpu_frequency: 80MHz
  connectivity:
  - wifi
tags:
- relay
- sonoff
docs_url: https://esphome.io/components/esp8266.html
pins:
- gpio: 0
  label: BUTTON
  features:
  - pwm
  - strapping
  available: false
  occupied_by: Front-panel push button
  notes: Strapping pin — wired to the front-panel button (active low, internal pull-up)
- gpio: 1
  label: GPIO1
  features:
  - pwm
  - uart_tx
  available: null
  notes: Default UART0 TX
- gpio: 2
  label: GPIO2
  features:
  - pwm
  - strapping
  available: null
  notes: Strapping pin — must be high during boot
- gpio: 3
  label: GPIO3
  features:
  - pwm
  - uart_rx
  available: null
  notes: Default UART0 RX
- gpio: 4
  label: GPIO4
  features:
  - pwm
  - i2c_sda
  available: null
  notes: Default I2C SDA
- gpio: 5
  label: GPIO5
  features:
  - pwm
  - i2c_scl
  available: null
  notes: Default I2C SCL
- gpio: 6
  label: GPIO6
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash CLK — do not use
- gpio: 7
  label: GPIO7
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash D0 — do not use
- gpio: 8
  label: GPIO8
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash D1 — do not use
- gpio: 9
  label: GPIO9
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash D2 — do not use (may be usable in DIO mode)
- gpio: 10
  label: GPIO10
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash D3 — do not use (may be usable in DIO mode)
- gpio: 11
  label: GPIO11
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash CS — do not use
- gpio: 12
  label: RELAY
  features:
  - pwm
  - spi_miso
  available: false
  occupied_by: 10 A onboard relay
  notes: Drives the front-panel relay (active high)
- gpio: 13
  label: STATUS_LED
  features:
  - pwm
  - spi_mosi
  available: false
  occupied_by: Front-panel status LED
  notes: Onboard blue status LED (active low — must be inverted)
- gpio: 14
  label: GPIO14
  features:
  - pwm
  - spi_clk
  available: null
  notes: Default SPI CLK
- gpio: 15
  label: GPIO15
  features:
  - pwm
  - spi_cs
  - strapping
  available: null
  notes: Default SPI CS — strapping pin (must be LOW during boot)
- gpio: 16
  label: GPIO16
  available: null
  notes: RTC wake pin — no PWM, no I2C, no interrupts; used for deep sleep wake
- gpio: 17
  label: A0
  features:
  - adc
  available: null
  notes: Analog input (TOUT pin) — 0-1V range, single ADC channel; not a standard GPIO
featured_components:
- id: relay
  component_id: switch.gpio
  name: Onboard Relay
  description: |
    The 10 A AC relay is hard-wired to GPIO12. This recommendation pre-fills
    the GPIO and gives it a sensible default name.
  fields:
    pin:
      value: 12
      locked: true
    name: Relay
- id: button
  component_id: binary_sensor.gpio
  name: Front-Panel Button
  description: |
    Front-panel push button on GPIO0 (active low — note ``inverted: true``
    plus the internal pull-up).
  fields:
    pin:
      value:
        number: 0
        mode:
          input: true
          pullup: true
        inverted: true
      locked: true
- id: status-led-output
  component_id: output.gpio
  name: Status LED Output
  description: |
    Low-level GPIO output for the onboard blue LED on GPIO13. Pair with
    a ``Status LED Light`` so Home Assistant can toggle it as a light.
  fields:
    pin:
      value: 13
      locked: true
    inverted: true
- id: status-led-light
  component_id: light.binary
  name: Status LED Light
  description: |
    Binary light entity for the onboard status LED. Wire its ``output``
    to the ``status-led-output`` you added.
  fields:
    name: Status LED
featured_bundles:
- id: status-led
  name: Status LED (full setup)
  description: |
    Adds the GPIO output for the onboard LED plus a binary light entity
    so it surfaces as a controllable light in Home Assistant.
  component_ids: [status-led-output, status-led-light]
