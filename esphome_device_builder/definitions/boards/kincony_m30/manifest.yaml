id: kincony_m30
name: KinCony-M30
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
  framework: arduino
hardware:
  connectivity:
  - wifi
  - bluetooth
  - ethernet
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/KinCony-M30/M30.jpg
pins:
- gpio: 12
  available: false
  occupied_by: light1
- gpio: 17
  available: false
  occupied_by: Ethernet CLK
- gpio: 18
  available: false
  occupied_by: Ethernet MDIO
- gpio: 23
  available: false
  occupied_by: Ethernet MDC
- gpio: 32
  available: false
  occupied_by: modbus_uart
- gpio: 33
  available: false
  occupied_by: modbus_uart
docs_url: https://devices.esphome.io/devices/KinCony-M30/
featured_components:
- id: modbus_hub
  component_id: modbus
  fields:
    id:
      value: modbus_hub
      locked: true
    uart_id:
      value: modbus_uart
      locked: true
  requires:
  - modbus_uart
- id: modbus_uart
  component_id: uart
  fields:
    rx_pin:
      value: 32
      locked: true
    tx_pin:
      value: 33
      locked: true
    baud_rate: 115200
    stop_bits: 1
    data_bits: 8
    parity: NONE
    id:
      value: modbus_uart
      locked: true
- id: modbus_hub_m30
  component_id: modbus_controller
  fields:
    address: 1
    update_interval: 5s
    id:
      value: modbus_hub_m30
      locked: true
    modbus_id:
      value: modbus_hub
      locked: true
  requires:
  - modbus_hub
- id: onboard_ethernet
  component_id: ethernet
  name: Onboard Ethernet
  fields:
    type:
      value: LAN8720
      locked: true
    mdc_pin:
      value: GPIO23
      locked: true
    mdio_pin:
      value: GPIO18
      locked: true
    phy_addr:
      value: 0
      locked: true
    clk:
      value:
        pin: GPIO17
        mode: CLK_OUT
      locked: true
- id: light1
  component_id: light.esp32_rmt_led_strip
  fields:
    rgb_order: GRB
    pin:
      value: 12
      locked: true
    num_leds: 30
    chipset: ws2812
    id: light1
    name: light1
