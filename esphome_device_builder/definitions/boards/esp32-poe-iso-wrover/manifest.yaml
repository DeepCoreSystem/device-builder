id: esp32-poe-iso-wrover
name: OLIMEX ESP32-PoE-ISO (WROVER)
description: Olimex ESP32-POE-ISO with ESP32-WROVER-E, 8MB PSRAM, galvanically isolated Power over Ethernet (802.3af), and microSD slot. The WROVER variant routes the Ethernet clock to GPIO0 and uses GPIO16/17 for PSRAM.
manufacturer: OLIMEX
images:
- https://www.olimex.com/Products/IoT/ESP32/ESP32-POE-ISO/images/thumbs/310x230/ESP32-POE-ISO-1.jpg
esphome:
  platform: esp32
  board: esp32-poe-iso
  variant: esp32
  framework: esp-idf
hardware:
  flash_size: 4MB
  ram_size: 327680
  cpu_frequency: 240MHz
  connectivity:
  - wifi
  - bluetooth
  - ethernet
  - can
tags:
- dev-kit
- poe
- sd-card
docs_url: https://esphome.io/components/esp32.html
product_url: https://www.olimex.com/Products/IoT/ESP32/ESP32-POE-ISO/open-source-hardware
featured_components:
- id: onboard_ethernet
  component_id: ethernet
  name: Onboard Ethernet
  description: Built-in Ethernet PHY with isolated PoE — wired networking with no Wi-Fi setup.
  fields:
    type:
      value: LAN8720
      locked: true
    mdc_pin:
      value: GPIO23
      locked: true
    mdio_pin:
      value: GPIO18
      locked: true
    clk:
      value:
        pin: GPIO0
        mode: CLK_OUT
      locked: true
    phy_addr:
      value: 0
      locked: true
    power_pin:
      value:
        number: GPIO12
        ignore_strapping_warning: true
      locked: true
pins:
- gpio: 0
  label: GPIO0
  available: false
  occupied_by: Ethernet CLK
  notes: 50MHz RMII reference clock output on WROVER variants
