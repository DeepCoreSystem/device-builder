id: brilliant_lighting_bl20925_power_monitoring_plug
name: Brilliant Lighting BL20925 Power Monitoring Plug
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Brilliant-Lighting-BL20925-Power-Monitoring-Plug/Brilliant-Lighting-BL20925-Power-Monitoring-Plug.jpeg
tags:
- relay
- compact
pins:
- gpio: 3
  available: false
  occupied_by: Brilliant Smartplug 1 Button
- gpio: 4
  available: false
  occupied_by: sensor.hlw8012
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: sensor.hlw8012
- gpio: 13
  available: false
  occupied_by: brilliant_smartplug_1_blue_output
- gpio: 14
  available: false
  occupied_by: Brilliant Smartplug 1
docs_url: https://devices.esphome.io/devices/Brilliant-Lighting-BL20925-Power-Monitoring-Plug/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    device_class: power
    pin:
      value:
        number: 3
        inverted: true
      locked: true
    id: binary_sensor_gpio_1
    name: Brilliant Smartplug 1 Button
- id: brilliant_smartplug_1_blue_led
  component_id: light.monochromatic
  fields:
    output: brilliant_smartplug_1_blue_output
    id: brilliant_smartplug_1_blue_led
    name: Brilliant Smartplug 1 Light
- id: brilliant_smartplug_1_blue_output
  component_id: output.esp8266_pwm
  fields:
    pin:
      value:
        number: 13
        inverted: true
      locked: true
    id: brilliant_smartplug_1_blue_output
- id: sensor_uptime_1
  component_id: sensor.uptime
  fields:
    filters:
      value:
      - lambda: return x / 60.0;
      locked: true
    unit_of_measurement: minutes
    id: sensor_uptime_1
    name: Brilliant Smartplug 1 Uptime
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: Brilliant Smartplug 1 Wifi Signal
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 4
      locked: true
    cf1_pin:
      value: 5
      locked: true
    change_mode_every: 3
    update_interval: 3s
    id: sensor_hlw8012_1
- id: relay
  component_id: switch.gpio
  fields:
    pin:
      value: 14
      locked: true
    restore_mode: RESTORE_DEFAULT_OFF
    id: relay
    name: Brilliant Smartplug 1
featured_bundles:
- id: brilliant_smartplug_1_blue_led_setup
  name: Brilliant Smartplug 1 Light (full setup)
  component_ids:
  - brilliant_smartplug_1_blue_output
  - brilliant_smartplug_1_blue_led
source:
  type: esphome-devices
  remote_id: Brilliant-Lighting-BL20925-Power-Monitoring-Plug
  upstream_url: https://github.com/esphome/devices.esphome.io/blob/main/src/docs/devices/Brilliant-Lighting-BL20925-Power-Monitoring-Plug/index.md
  upstream_revision: a3fac0e48920548cbdce5fc00cb8b05571b4d83e
