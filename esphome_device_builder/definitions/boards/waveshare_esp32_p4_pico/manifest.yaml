id: waveshare_esp32_p4_pico
name: Waveshare ESP32-P4-Pico
description: Waveshare ESP32-P4-Pico in the Raspberry Pi Pico form factor with the ESP32-P4NRW32
  (dual-core RISC-V @ 400MHz, 32MB flash, 32MB PSRAM) and an onboard ESP32-C6 co-processor.
  The ESP32-P4 has no built-in radio; Wi-Fi 6 works out of the box through the onboard ESP32-C6
  co-processor. MIPI DSI display and MIPI CSI camera connectors, microSD slot, microphone
  + speaker header, USB-C port plus 4-pin USB OTG header, 27 user GPIOs.
manufacturer: Waveshare
images:
- https://www.waveshare.com/media/catalog/product/cache/1/image/800x800/9df78eab33525d08d6e5fb8d27136e95/e/s/esp32-p4-pico-1.jpg
esphome:
  platform: esp32
  board: esp32-p4-evboard
  variant: esp32p4
  framework: esp-idf
hardware:
  flash_size: 32MB
  cpu_frequency: 400MHz
  connectivity:
  - wifi
tags:
- compact
- sd-card
- usb-c
- camera
- display
- microphone
docs_url: https://www.waveshare.com/wiki/ESP32-P4-Pico
product_url: https://www.waveshare.com/esp32-p4-pico.htm
featured_components:
- id: c6_wifi
  component_id: esp32_hosted
  name: Wi-Fi via ESP32-C6 co-processor
  description: Onboard ESP32-C6 running ESP-Hosted over SDIO gives the radio-less ESP32-P4
    Wi-Fi 6. Installed automatically in every new device — the wifi block only works while
    this is present. If the C6 never comes up on your unit, try active_high false.
  fields:
    type:
      value: sdio
      locked: true
    variant:
      value: ESP32C6
      locked: true
    active_high:
      value: true
    reset_pin:
      value: GPIO54
      locked: true
    clk_pin:
      value: GPIO18
      locked: true
    cmd_pin:
      value: GPIO19
      locked: true
    d0_pin:
      value: GPIO14
      locked: true
    d1_pin:
      value: GPIO15
      locked: true
    d2_pin:
      value: GPIO16
      locked: true
    d3_pin:
      value: GPIO17
      locked: true
default_components:
- c6_wifi
