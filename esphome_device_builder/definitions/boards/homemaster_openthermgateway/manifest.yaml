id: homemaster_openthermgateway
name: HomeMaster-OpenTherm-Gateway
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
  framework: esp-idf
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Homemaster-OpenthermGateway/opentherm.png
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Homemaster-OpenthermGateway/pinout.png
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Homemaster-OpenthermGateway/diagram.png
tags:
- relay
pins:
- gpio: 4
  available: false
  occupied_by: ow_bus_1
- gpio: 5
  available: false
  occupied_by: ow_bus_2
- gpio: 32
  available: false
  occupied_by: Relay
- gpio: 35
  available: false
  occupied_by: Button
docs_url: https://devices.esphome.io/devices/Homemaster-OpenthermGateway/
product_url: https://github.com/isystemsautomation/homemaster-dev/tree/main/OpenthermGateway
featured_components:
- id: ow_bus_1
  component_id: one_wire.gpio
  fields:
    pin:
      value: 4
      locked: true
    id:
      value: ow_bus_1
      locked: true
- id: ow_bus_2
  component_id: one_wire.gpio
  fields:
    pin:
      value: 5
      locked: true
    id:
      value: ow_bus_2
      locked: true
- id: esp_status
  component_id: binary_sensor.status
  fields:
    entity_category: diagnostic
    id: esp_status
    name: ESP Status
- id: button_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 35
        inverted: true
        mode:
          input: true
      locked: true
    id: button_1
    name: Button
- id: esp_uptime
  component_id: sensor.uptime
  fields:
    update_interval: 60s
    entity_category: diagnostic
    id: esp_uptime
    name: Uptime
- id: wifi_signal_db
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    entity_category: diagnostic
    id: wifi_signal_db
    name: WiFi Signal
- id: esp32_temperature
  component_id: sensor.internal_temperature
  fields:
    update_interval: 60s
    entity_category: diagnostic
    id: esp32_temperature
    name: ESP32 Temperature
- id: ow_bus_1_temperature
  component_id: sensor.dallas_temp
  fields:
    unit_of_measurement: °C
    id: ow_bus_1_temperature
    name: 1-Wire Bus 1 Temperature
  requires:
  - ow_bus_1
- id: ow_bus_2_temperature
  component_id: sensor.dallas_temp
  fields:
    unit_of_measurement: °C
    id: ow_bus_2_temperature
    name: 1-Wire Bus 2 Temperature
  requires:
  - ow_bus_2
- id: relay_1
  component_id: switch.gpio
  fields:
    pin:
      value: 32
      locked: true
    id: relay_1
    name: Relay
- id: esphome_version
  component_id: text_sensor.version
  fields:
    entity_category: diagnostic
    id: esphome_version
    name: ESPHome Version
source:
  type: esphome-devices
  remote_id: Homemaster-OpenthermGateway
  upstream_url: https://github.com/esphome/devices.esphome.io/blob/main/src/docs/devices/Homemaster-OpenthermGateway/index.md
  upstream_revision: 99a95f2f6fa1642d773820cdf5d20020358ab9dc
