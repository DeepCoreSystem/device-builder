id: wesp32
name: Silicognition wESP32
description: Silicognition wESP32 with ESP32 and onboard Ethernet with Power over Ethernet. Rev 7 and newer
  use the RTL8201 PHY; the MDC/MDIO lines sit on GPIO16/17.
manufacturer: Silicognition
esphome:
  platform: esp32
  board: wesp32
  variant: esp32
  framework: esp-idf
hardware:
  flash_size: 16MB
  connectivity:
  - wifi
  - bluetooth
  - ethernet
tags:
- dev-kit
- poe
docs_url: https://esphome.io/components/ethernet.html
product_url: https://wesp32.com/
featured_components:
- id: onboard_ethernet
  component_id: ethernet
  name: Onboard Ethernet
  description: Built-in RTL8201 Ethernet PHY (rev 7+) with PoE — wired networking with no Wi-Fi setup.
  fields:
    type:
      value: RTL8201
      locked: true
    mdc_pin:
      value: GPIO16
      locked: true
    mdio_pin:
      value: GPIO17
      locked: true
    clk:
      value:
        pin: GPIO0
        mode: CLK_EXT_IN
      locked: true
    phy_addr:
      value: 0
      locked: true
pins:
- gpio: 0
  label: GPIO0
  available: false
  occupied_by: Ethernet CLK
- gpio: 1
  label: GPIO1
  features:
  - uart_tx
  - pwm
  notes: Default UART0 TX
- gpio: 2
  label: GPIO2
  features:
  - adc
  - touch
  - pwm
  - strapping
  notes: ADC2_CH2, Touch2 — strapping pin (must be low/floating for flash boot)
- gpio: 3
  label: GPIO3
  features:
  - uart_rx
  - pwm
  notes: Default UART0 RX
- gpio: 4
  label: GPIO4
  features:
  - adc
  - touch
  - pwm
  - i2c_scl
  notes: ADC2_CH0, Touch0 • I2C SCL
- gpio: 5
  label: GPIO5
  features:
  - pwm
  - spi_cs
  - strapping
  - i2c_scl
  notes: Default VSPI CS — strapping pin (outputs PWM at boot) • I2C1 SCL
- gpio: 6
  label: GPIO6
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash CLK — do not use
- gpio: 7
  label: GPIO7
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash SD0 — do not use
- gpio: 8
  label: GPIO8
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash SD1 — do not use
- gpio: 9
  label: GPIO9
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash SD2 — do not use
- gpio: 10
  label: GPIO10
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash SD3 — do not use
- gpio: 11
  label: GPIO11
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash CMD — do not use
- gpio: 12
  label: GPIO12
  features:
  - adc
  - touch
  - pwm
  - strapping
  - spi_miso
  notes: ADC2_CH5, Touch5 — strapping pin (must be LOW during boot for correct flash voltage) • SPI1 MISO
- gpio: 13
  label: GPIO13
  features:
  - adc
  - touch
  - pwm
  - spi_mosi
  notes: ADC2_CH4, Touch4 • SPI1 MOSI
- gpio: 14
  label: GPIO14
  features:
  - adc
  - touch
  - pwm
  - spi_clk
  notes: ADC2_CH6, Touch6 • SPI1 SCK
- gpio: 15
  label: GPIO15
  features:
  - adc
  - touch
  - pwm
  - strapping
  - i2c_sda
  notes: ADC2_CH3, Touch3 — strapping pin (outputs PWM at boot) • I2C SDA
- gpio: 16
  label: GPIO16
  available: false
  occupied_by: Ethernet MDC
- gpio: 17
  label: GPIO17
  available: false
  occupied_by: Ethernet MDIO
- gpio: 18
  label: GPIO18
  features:
  - pwm
  - spi_clk
  notes: Default VSPI CLK • SPI SCK
- gpio: 19
  label: GPIO19
  features:
  - pwm
  - spi_miso
  notes: Default VSPI MISO
- gpio: 21
  label: GPIO21
  features:
  - pwm
  - i2c_sda
  notes: Default I2C SDA
- gpio: 22
  label: GPIO22
  features:
  - pwm
  - i2c_scl
  notes: Default I2C SCL
- gpio: 23
  label: GPIO23
  features:
  - pwm
  - spi_mosi
  notes: Default VSPI MOSI • SPI MOSI
- gpio: 25
  label: GPIO25
  features:
  - adc
  - dac
  - pwm
  notes: ADC2_CH8, DAC1
- gpio: 26
  label: GPIO26
  features:
  - adc
  - dac
  - pwm
  notes: ADC2_CH9, DAC2
- gpio: 27
  label: GPIO27
  features:
  - adc
  - touch
  - pwm
  notes: ADC2_CH7, Touch7
- gpio: 32
  label: GPIO32
  features:
  - adc
  - touch
  - pwm
  - spi_miso
  notes: ADC1_CH4, Touch9 • SPI MISO
- gpio: 33
  label: GPIO33
  features:
  - adc
  - touch
  - pwm
  - i2c_sda
  notes: ADC1_CH5, Touch8 • I2C1 SDA
- gpio: 34
  label: GPIO34
  features:
  - adc
