  notes: ADC1_CH6 — input only, no internal pull-up/pull-down
- gpio: 35
  label: GPIO35
  features:
  - adc
  - input_only
  notes: ADC1_CH7 — input only, no internal pull-up/pull-down
- gpio: 36
  label: GPIO36
  features:
  - adc
  - input_only
  notes: ADC1_CH0 (VP) — input only, no internal pull-up/pull-down
- gpio: 37
  label: GPIO37
  features:
  - adc
  - input_only
