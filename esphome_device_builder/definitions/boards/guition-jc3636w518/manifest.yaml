id: guition-jc3636w518
name: Guition JC3636W518
description: >-
  Guition JC3636W518: an ESP32-S3 board with a 1.5" 360x360 round LCD driven over a
  quad-SPI (QSPI) bus, with a CST816 capacitive touch panel on I2C. The board has 8MB
  octal PSRAM, which the display buffer relies on, so it is part of the Display bundle.
  Panels ship in two revisions with different init sequences; select the JC3636W518V2
  model instead if the base model shows wrong colors.
manufacturer: Guition
esphome:
  platform: esp32
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework: esp-idf
hardware:
  flash_size: 16MB
  connectivity:
  - wifi
  - bluetooth
tags:
- display
docs_url: https://esphome.io/components/display/mipi_spi/
pins:
- gpio: 7
  available: false
  occupied_by: i2c_bus
  features:
  - i2c_sda
  notes: Touch I2C SDA
- gpio: 8
  available: false
  occupied_by: i2c_bus
  features:
  - i2c_scl
  notes: Touch I2C SCL
- gpio: 9
  available: false
  occupied_by: lcd_spi
  features:
  - spi_clk
  notes: Display QSPI clock
- gpio: 10
  available: false
  occupied_by: lcd_display
  notes: Display CS
- gpio: 11
  available: false
  occupied_by: lcd_spi
  notes: Display QSPI data0
- gpio: 12
  available: false
  occupied_by: lcd_spi
  notes: Display QSPI data1
- gpio: 13
  available: false
  occupied_by: lcd_spi
  notes: Display QSPI data2
- gpio: 14
  available: false
  occupied_by: lcd_spi
  notes: Display QSPI data3
- gpio: 15
  available: false
  occupied_by: backlight_output
  notes: Display backlight
- gpio: 40
  available: false
  occupied_by: lcd_touch
  notes: CST816 touch reset
- gpio: 41
  available: false
  occupied_by: lcd_touch
  notes: CST816 touch interrupt
- gpio: 47
  available: false
  occupied_by: lcd_display
  notes: Display reset
featured_components:
- id: lcd_spi
  component_id: spi
  fields:
    type: quad
    clk_pin:
      value: 9
      locked: true
    data_pins:
      value:
      - 11
      - 12
      - 13
      - 14
      locked: true
    id:
      value: lcd_spi
      locked: true
- id: lcd_psram
  component_id: psram
  fields:
    mode: octal
    speed: 80MHz
- id: i2c_bus
  component_id: i2c
  fields:
    sda:
      value: 7
      locked: true
    scl:
      value: 8
      locked: true
    scan: true
    id:
      value: i2c_bus
      locked: true
- id: backlight_output
  component_id: output.ledc
  fields:
    pin:
      value: 15
      locked: true
    frequency: 1000Hz
    id: backlight_output
- id: display_backlight
  component_id: light.monochromatic
  fields:
    name: Display Backlight
    icon: mdi:brightness-7
    restore_mode: ALWAYS_ON
    output: backlight_output
    id: display_backlight
  requires:
  - backlight_output
- id: lcd_display
  component_id: display.mipi_spi
  fields:
    model: JC3636W518
    spi_id:
      value: lcd_spi
      locked: true
    show_test_card: true
    id: lcd_display
  requires:
  - lcd_spi
  - lcd_psram
- id: lcd_touch
  component_id: touchscreen.cst816
  fields:
    i2c_id:
      value: i2c_bus
      locked: true
    interrupt_pin:
      value: 41
      locked: true
    reset_pin:
      value: 40
      locked: true
    display: lcd_display
    id: lcd_touch
  requires:
  - i2c_bus
  - lcd_display
featured_bundles:
- id: display_setup
  name: Display (full setup)
  component_ids:
  - lcd_spi
  - lcd_psram
  - backlight_output
  - display_backlight
  - lcd_display
- id: touchscreen_setup
  name: Touchscreen (full setup)
