id: cloudfree_eu_plug_p1eu
name: CloudFree EU Plug (P1EU)
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/CloudFree-EU-Plug-P1EU/cloudfree_P1EU.jpg
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/CloudFree-EU-Plug-P1EU/cloudfree_P1EU_Reference.jpg
tags:
- relay
- compact
pins:
- gpio: 2
  available: false
  occupied_by: cloudfree_smart_plug_1_blue_output
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: sensor.hlw8012
- gpio: 13
  available: false
  occupied_by: CloudFree Smart Plug 1 Button
- gpio: 14
  available: false
  occupied_by: sensor.hlw8012
- gpio: 15
  available: false
  occupied_by: CloudFree Smart Plug 1
docs_url: https://devices.esphome.io/devices/CloudFree-EU-Plug-P1EU/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    device_class: power
    pin:
      value:
        number: 13
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: binary_sensor_gpio_1
    name: CloudFree Smart Plug 1 Button
- id: cloudfree_smart_plug_1_blue_led
  component_id: light.monochromatic
  fields:
    output: cloudfree_smart_plug_1_blue_output
    id: cloudfree_smart_plug_1_blue_led
    name: CloudFree Smart Plug 1 Light
- id: cloudfree_smart_plug_1_blue_output
  component_id: output.esp8266_pwm
  fields:
    pin:
      value:
        number: 2
        inverted: true
      locked: true
    id: cloudfree_smart_plug_1_blue_output
- id: sensor_uptime_1
  component_id: sensor.uptime
  fields:
    filters:
      value:
      - lambda: return x / 60.0;
      locked: true
    unit_of_measurement: minutes
    id: sensor_uptime_1
    name: CloudFree Smart Plug 1 Uptime
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: CloudFree Smart Plug 1 Wifi Signal
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 5
      locked: true
    cf1_pin:
      value: 14
      locked: true
    change_mode_every: 8
    update_interval: 10s
    current_resistor: '0.00221'
    voltage_divider: '955'
    id: sensor_hlw8012_1
- id: relay
  component_id: switch.gpio
  fields:
    pin:
      value: 15
      locked: true
    restore_mode: RESTORE_DEFAULT_OFF
    id: relay
    name: CloudFree Smart Plug 1
featured_bundles:
- id: cloudfree_smart_plug_1_blue_led_setup
  name: CloudFree Smart Plug 1 Light (full setup)
  component_ids:
  - cloudfree_smart_plug_1_blue_output
  - cloudfree_smart_plug_1_blue_led
source:
  type: esphome-devices
  remote_id: CloudFree-EU-Plug-P1EU
  upstream_url: https://github.com/esphome/devices.esphome.io/blob/main/src/docs/devices/CloudFree-EU-Plug-P1EU/index.md
  upstream_revision: a3fac0e48920548cbdce5fc00cb8b05571b4d83e
