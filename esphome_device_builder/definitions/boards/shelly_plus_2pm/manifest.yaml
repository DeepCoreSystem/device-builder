id: shelly_plus_2pm
name: Shelly Plus 2PM
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
  framework: arduino
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Shelly-Plus-2PM/shellyplus2pm_pcb_versions.png
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Shelly-Plus-2PM/ESP32-U4WDH_versions.png
tags:
- shelly
pins:
- gpio: 4
  available: false
  occupied_by: shelly-plus-2pm Button
- gpio: 5
  available: false
  occupied_by: Input 1
- gpio: 12
  available: false
  occupied_by: relay_output_2
- gpio: 13
  available: false
  occupied_by: relay_output_1
- gpio: 18
  available: false
  occupied_by: Input 2
- gpio: 25
  available: false
  occupied_by: i2c
- gpio: 26
  available: false
  occupied_by: i2c
- gpio: 27
  available: false
  occupied_by: sensor.ade7953_i2c
- gpio: 35
  available: false
  occupied_by: temp_analog_reading
docs_url: https://devices.esphome.io/devices/Shelly-Plus-2PM/
featured_components:
- id: i2c_bus
  component_id: i2c
  fields:
    sda:
      value: 26
      locked: true
    scl:
      value: 25
      locked: true
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 4
        inverted: true
        mode:
          input: true
          pullup: true
      locked: true
    internal: true
    id: binary_sensor_gpio_1
    name: shelly-plus-2pm Button
- id: binary_sensor_gpio_2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 5
        ignore_strapping_warning: true
      locked: true
    filters:
      value:
      - delayed_on_off: 50ms
      locked: true
    internal: true
    id: binary_sensor_gpio_2
    name: Input 1
- id: binary_sensor_gpio_3
  component_id: binary_sensor.gpio
  fields:
    pin:
      value: 18
      locked: true
    filters:
      value:
      - delayed_on_off: 50ms
      locked: true
    internal: true
    id: binary_sensor_gpio_3
    name: Input 2
- id: relay_output_1
  component_id: output.gpio
  fields:
    pin:
      value: 13
      locked: true
    id: relay_output_1
- id: relay_output_2
  component_id: output.gpio
  fields:
    pin:
      value:
        number: 12
        ignore_strapping_warning: true
      locked: true
    id: relay_output_2
- id: sensor_ade7953_i2c_1
  component_id: sensor.ade7953_i2c
  fields:
    irq_pin:
      value: 27
      locked: true
    update_interval: 10s
    id: sensor_ade7953_i2c_1
  requires:
  - i2c_bus
- id: temp_resistance_reading
  component_id: sensor.resistance
  fields:
    configuration: DOWNSTREAM
    resistor: 5.6kOhm
    sensor: temp_analog_reading
    id: temp_resistance_reading
    name: temp_resistance_reading
- id: temp_analog_reading
  component_id: sensor.adc
  fields:
    pin:
      value: 35
      locked: true
    attenuation: 12db
    update_interval: 10s
    id: temp_analog_reading
    name: temp_analog_reading
- id: relay_1
  component_id: switch.output
  fields:
    output: relay_output_1
    id: relay_1
    name: Output 1
- id: relay_2
  component_id: switch.output
  fields:
    output: relay_output_2
    id: relay_2
    name: Output 2
featured_bundles:
- id: temp_resistance_reading_setup
  name: temp_resistance_reading (full setup)
  component_ids:
  - temp_analog_reading
  - temp_resistance_reading
- id: relay_1_setup
  name: Output 1 (full setup)
  component_ids:
  - relay_output_1
  - relay_1
- id: relay_2_setup
  name: Output 2 (full setup)
  component_ids:
  - relay_output_2
  - relay_2
source:
  type: esphome-devices
