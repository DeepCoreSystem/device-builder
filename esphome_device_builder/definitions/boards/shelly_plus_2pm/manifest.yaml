id: shelly_plus_2pm
name: Shelly Plus 2PM
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
  framework: arduino
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- images/shellyplus2pm_pcb_versions.png
- images/ESP32-U4WDH_versions.png
tags:
- shelly
pins:
- gpio: 4
  available: false
  occupied_by: binary_sensor.gpio (${devicename} Button)
- gpio: 5
  available: false
  occupied_by: binary_sensor.gpio (${input_name_1})
- gpio: 12
  available: false
  occupied_by: output.gpio (relay_output_2)
- gpio: 13
  available: false
  occupied_by: output.gpio (relay_output_1)
- gpio: 18
  available: false
  occupied_by: binary_sensor.gpio (${input_name_2})
- gpio: 27
  available: false
  occupied_by: sensor.ade7953_i2c
- gpio: 35
  available: false
  occupied_by: sensor.adc (temp_analog_reading)
docs_url: https://devices.esphome.io/devices/Shelly-Plus-2PM/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 4
        inverted: true
        mode:
          input: true
          pullup: true
      locked: true
    internal: true
    id: binary_sensor_gpio_1
    name: Gpio 1
- id: binary_sensor_gpio_2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 5
        ignore_strapping_warning: true
      locked: true
    internal: true
    id: binary_sensor_gpio_2
    name: Gpio 2
- id: binary_sensor_gpio_3
  component_id: binary_sensor.gpio
  fields:
    pin:
      value: 18
      locked: true
    internal: true
    id: binary_sensor_gpio_3
    name: Gpio 3
- id: output_gpio_1
  component_id: output.gpio
  fields:
    pin:
      value: 13
      locked: true
    id: output_gpio_1
- id: output_gpio_2
  component_id: output.gpio
  fields:
    pin:
      value:
        number: 12
        ignore_strapping_warning: true
      locked: true
    id: output_gpio_2
- id: sensor_ade7953_i2c_1
  component_id: sensor.ade7953_i2c
  fields:
    irq_pin:
      value: 27
      locked: true
    update_interval: 10s
    id: sensor_ade7953_i2c_1
    name: Ade7953 I2C 1
- id: sensor_ntc_1
  component_id: sensor.ntc
  fields:
    sensor: temp_resistance_reading
    unit_of_measurement: °C
    accuracy_decimals: 1
    icon: mdi:thermometer
    entity_category: diagnostic
    id: sensor_ntc_1
    name: Ntc 1
- id: sensor_resistance_1
  component_id: sensor.resistance
  fields:
    sensor: temp_analog_reading
    configuration: DOWNSTREAM
    resistor: 5.6kOhm
    id: sensor_resistance_1
    name: Resistance 1
- id: sensor_adc_1
  component_id: sensor.adc
  fields:
    pin:
      value: 35
      locked: true
    attenuation: 12db
    update_interval: 10s
    id: sensor_adc_1
    name: Adc 1
- id: switch_output_1
  component_id: switch.output
  fields:
    output: relay_output_1
    id: switch_output_1
    name: Output 1
- id: switch_output_2
  component_id: switch.output
  fields:
    output: relay_output_2
    id: switch_output_2
    name: Output 2
source:
  type: esphome-devices
  remote_id: Shelly-Plus-2PM
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Shelly-Plus-2PM/index.md
