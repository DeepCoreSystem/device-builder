featured_components:
- id: uart_zsu
  component_id: uart
  fields:
    baud_rate: 115200
    debug:
      value:
        direction: BOTH
        dummy_receiver: true
        after:
          timeout: 10ms
        sequence:
        - lambda: UARTDebug::log_string(direction, bytes);
