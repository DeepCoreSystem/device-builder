id: kogan_smarterhome_smart_power_board_with_usb_ports_energy_meter
name: Kogan SmarterHome Smart Power Board With USB Ports & Energy Meter
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- images/kogan-smarterhome-smart-power-board-with-usb-ports-energy-meter.jpg
tags:
- relay
- compact
pins:
- gpio: 0
  available: false
  occupied_by: binary_sensor.gpio (${device_name}_button)
- gpio: 1
  available: false
  occupied_by: light.status_led (green_led)
- gpio: 3
  available: false
  occupied_by: switch.gpio (${device_name}_plug3)
- gpio: 4
  available: false
  occupied_by: sensor.hlw8012
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: sensor.hlw8012
- gpio: 13
  available: false
  occupied_by: switch.gpio (${device_name}_plug1)
- gpio: 14
  available: false
  occupied_by: switch.gpio (${device_name}_plug2)
- gpio: 15
  available: false
  occupied_by: switch.gpio (${device_name}_usb)
docs_url: https://devices.esphome.io/devices/Kogan-Smarterhome-Smart-Power-Board-With-Usb-Ports-Energy-Meter/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 0
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: binary_sensor_gpio_1
    name: Gpio 1
- id: light_status_led_1
  component_id: light.status_led
  fields:
    pin:
      value:
        number: 1
        inverted: true
      locked: true
    id: light_status_led_1
    name: Status Led 1
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 4
      locked: true
    cf1_pin:
      value: 5
      locked: true
    change_mode_every: 8
    update_interval: 15s
    id: sensor_hlw8012_1
    name: Hlw8012 1
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    unit_of_measurement: kWh
    id: sensor_total_daily_energy_1
    name: Total Daily Energy 1
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 5min
    id: sensor_wifi_signal_1
    name: Wifi Signal 1
- id: switch_gpio_1
  component_id: switch.gpio
  fields:
    pin:
      value: 13
      locked: true
    id: switch_gpio_1
    name: Gpio 1
- id: switch_gpio_2
  component_id: switch.gpio
  fields:
    pin:
      value: 14
      locked: true
    id: switch_gpio_2
    name: Gpio 2
- id: switch_gpio_3
  component_id: switch.gpio
  fields:
    pin:
      value: 3
      locked: true
    id: switch_gpio_3
    name: Gpio 3
- id: switch_gpio_4
  component_id: switch.gpio
  fields:
    pin:
      value: 15
      locked: true
    id: switch_gpio_4
    name: Gpio 4
- id: text_sensor_template_1
  component_id: text_sensor.template
  fields:
    icon: mdi:clock-start
    update_interval: 5min
    id: text_sensor_template_1
    name: Template 1
