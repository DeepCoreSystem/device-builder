id: nous_a1t
name: Nous A1t
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- images/neo_render4_tasmota.jpg
tags:
- relay
- compact
pins:
- gpio: 0
  available: false
  occupied_by: binary_sensor.gpio (button_state)
- gpio: 4
  available: false
  occupied_by: sensor.hlw8012
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: sensor.hlw8012
- gpio: 13
  available: false
  occupied_by: light.status_led (led)
- gpio: 14
  available: false
  occupied_by: switch.gpio (relay)
docs_url: https://devices.esphome.io/devices/Nous-A1t/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 0
        mode: INPUT_PULLUP
      locked: true
    id: binary_sensor_gpio_1
    name: Gpio 1
- id: light_status_led_1
  component_id: light.status_led
  fields:
    restore_mode: RESTORE_DEFAULT_ON
    pin:
      value:
        number: 13
        inverted: true
      locked: true
    id: light_status_led_1
    name: Status Led 1
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    icon: mdi:wifi
    id: sensor_wifi_signal_1
    name: Wifi Signal 1
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    power_id: nous_a1t_watt
    unit_of_measurement: kWh
    icon: mdi:calendar-clock
    id: sensor_total_daily_energy_1
    name: Total Daily Energy 1
- id: sensor_adc_1
  component_id: sensor.adc
  fields:
    icon: mdi:flash-outline
    id: sensor_adc_1
    name: Adc 1
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 4
      locked: true
    cf1_pin:
      value: 5
      locked: true
    change_mode_every: 4
    update_interval: 3s
    id: sensor_hlw8012_1
    name: Hlw8012 1
- id: switch_template_1
  component_id: switch.template
  fields:
    icon: mdi:power
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    id: switch_template_1
    name: Template 1
- id: switch_gpio_1
  component_id: switch.gpio
  fields:
    restore_mode: RESTORE_DEFAULT_ON
    pin:
      value: 14
      locked: true
    id: switch_gpio_1
    name: Gpio 1
- id: text_sensor_version_1
  component_id: text_sensor.version
  fields:
    hide_timestamp: true
    id: text_sensor_version_1
    name: Version 1
source:
