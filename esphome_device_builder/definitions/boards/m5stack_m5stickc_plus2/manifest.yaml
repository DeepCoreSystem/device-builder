featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 37
        inverted: false
      locked: true
    id: binary_sensor_gpio_1
    name: Gpio 1
- id: binary_sensor_gpio_2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 39
        inverted: true
      locked: true
    id: binary_sensor_gpio_2
    name: Gpio 2
- id: display_st7789v_1
  component_id: display.st7789v
  fields:
    model: TTGO TDisplay 135x240
    cs_pin:
      value: 5
      locked: true
    dc_pin:
      value: 14
      locked: true
    reset_pin:
      value: 12
      locked: true
    rotation: 270
    id: display_st7789v_1
    name: St7789V 1
- id: light_monochromatic_1
  component_id: light.monochromatic
  fields:
    output: builtin_led
    id: light_monochromatic_1
    name: Monochromatic 1
- id: light_monochromatic_2
  component_id: light.monochromatic
  fields:
    output: backlight
    id: light_monochromatic_2
    name: Monochromatic 2
- id: output_ledc_1
  component_id: output.ledc
  fields:
    pin:
      value: 10
      locked: true
    inverted:
      value: true
      locked: true
    id: output_ledc_1
- id: output_ledc_2
  component_id: output.ledc
  fields:
    pin:
      value: 2
      locked: true
    inverted:
      value: true
      locked: true
    id: output_ledc_2
- id: output_ledc_3
  component_id: output.ledc
  fields:
    pin:
      value: 27
      locked: true
    inverted:
      value: true
      locked: true
    id: output_ledc_3
- id: sensor_adc_1
  component_id: sensor.adc
  fields:
    pin:
      value: 38
      locked: true
    attenuation: 12db
    update_interval: 60s
    id: sensor_adc_1
    name: Battery Voltage
- id: sensor_mpu6886_1
  component_id: sensor.mpu6886
  fields:
    i2c_id: bus_a
    address: 104
    update_interval: 10s
    id: sensor_mpu6886_1
    name: Mpu6886 1
