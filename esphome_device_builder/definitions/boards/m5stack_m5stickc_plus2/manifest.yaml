id: m5stack_m5stickc_plus2
name: M5Stack M5StickC PLUS2
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- images/m5stickcplus2.png
pins:
- gpio: 2
  available: false
  occupied_by: output.ledc (buzzer)
- gpio: 5
  available: false
  occupied_by: display.st7789v
- gpio: 10
  available: false
  occupied_by: output.ledc (builtin_led)
- gpio: 12
  available: false
  occupied_by: display.st7789v
- gpio: 14
  available: false
  occupied_by: display.st7789v
- gpio: 27
  available: false
  occupied_by: output.ledc (backlight)
- gpio: 37
  available: false
  occupied_by: binary_sensor.gpio (${upper_devicename} Button A)
- gpio: 38
  available: false
  occupied_by: sensor.adc (Battery Voltage)
- gpio: 39
  available: false
  occupied_by: binary_sensor.gpio (${upper_devicename} Button B)
docs_url: https://devices.esphome.io/devices/M5Stack-M5StickC-PLUS2/
