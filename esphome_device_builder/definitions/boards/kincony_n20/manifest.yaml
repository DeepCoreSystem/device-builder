id: kincony_n20
name: KinCony-N20 AC energy meter
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework: arduino
hardware:
  connectivity:
  - wifi
  - bluetooth
  - ethernet
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/KinCony-N20/N20-1.jpg
pins:
- gpio: 1
  available: false
  occupied_by: Ethernet RESET
- gpio: 2
  available: false
  occupied_by: Ethernet INT
- gpio: 9
  available: false
  occupied_by: uart
- gpio: 10
  available: false
  occupied_by: uart
- gpio: 41
  available: false
  occupied_by: Ethernet CS
- gpio: 42
  available: false
  occupied_by: Ethernet CLK
- gpio: 43
  available: false
  occupied_by: Ethernet MOSI
- gpio: 44
  available: false
  occupied_by: Ethernet MISO
docs_url: https://devices.esphome.io/devices/KinCony-N20/
featured_components:
- id: modbus_bus
  component_id: modbus
  fields: {}
  requires:
  - uart_bus
- id: uart_bus
  component_id: uart
  fields:
    rx_pin:
      value: 9
      locked: true
    tx_pin:
      value: 10
      locked: true
    baud_rate: 115200
    stop_bits: 1
    data_bits: 8
    parity: NONE
- id: modbus_controller_hub
  component_id: modbus_controller
  fields:
    address: 1
    update_interval: 5s
  requires:
  - modbus_bus
  - uart_bus
- id: onboard_ethernet
  component_id: ethernet
  name: Onboard Ethernet
  fields:
    type:
      value: W5500
      locked: true
    clk_pin:
      value: GPIO42
      locked: true
    mosi_pin:
      value: GPIO43
      locked: true
    miso_pin:
      value: GPIO44
      locked: true
    cs_pin:
      value: GPIO41
      locked: true
    interrupt_pin:
      value: GPIO2
      locked: true
    reset_pin:
      value: GPIO1
      locked: true
