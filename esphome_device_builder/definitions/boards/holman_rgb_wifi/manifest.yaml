id: holman_rgb_wifi
name: Holman RGB Wifi Connected Controller
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
hardware:
  connectivity:
  - wifi
images:
- images/holman_rgb_controller.png
pins:
- gpio: 0
  available: false
  occupied_by: binary_sensor.gpio (${friendly_name} Panel Button)
- gpio: 12
  available: false
  occupied_by: output.esp8266_pwm (output_component_green)
- gpio: 13
  available: false
  occupied_by: output.esp8266_pwm (output_component_red)
- gpio: 14
  available: false
  occupied_by: output.esp8266_pwm (output_component_blue)
docs_url: https://devices.esphome.io/devices/Holman-RGB-Wifi/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 0
        inverted: true
        mode:
          input: true
          pullup: true
      locked: true
    id: binary_sensor_gpio_1
    name: Gpio 1
- id: button_restart_1
  component_id: button.restart
  fields:
    disabled_by_default: true
    id: button_restart_1
    name: Restart 1
- id: light_rgb_1
  component_id: light.rgb
  fields:
    red: output_component_red
    green: output_component_green
    blue: output_component_blue
    id: light_rgb_1
    name: RGB Lights
- id: output_esp8266_pwm_1
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 13
      locked: true
    id: output_esp8266_pwm_1
- id: output_esp8266_pwm_2
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 12
      locked: true
    id: output_esp8266_pwm_2
- id: output_esp8266_pwm_3
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 14
      locked: true
    id: output_esp8266_pwm_3
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 600s
    id: sensor_wifi_signal_1
    name: Wifi Signal 1
- id: text_sensor_template_1
  component_id: text_sensor.template
  fields:
    icon: mdi:clock-start
    entity_category: diagnostic
    id: text_sensor_template_1
    name: Uptime
source:
  type: esphome-devices
  remote_id: Holman-RGB-Wifi
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Holman-RGB-Wifi/index.md
  upstream_revision: 7fa250835bc3d3a2b319dced285d5e0c27171bd1
  content_hash: 93e80834d74dc7eb18054607cd90fe72fa8f1d4c4bac1004d26271b8707257a9
