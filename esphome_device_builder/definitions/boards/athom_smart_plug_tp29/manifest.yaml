featured_components:
- id: button_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 3
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: button_1
    name: button_1
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 4
      locked: true
    cf1_pin:
      value: 5
      locked: true
    change_mode_every: 4
    update_interval: 10s
    id: sensor_hlw8012_1
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    unit_of_measurement: kWh
    icon: mdi:clock-alert
    id: sensor_total_daily_energy_1
    name: Total Daily Energy
- id: sensor_uptime_1
  component_id: sensor.uptime
  fields:
    icon: mdi:clock-outline
    id: sensor_uptime_1
    name: Uptime
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: Wifi Signal
- id: relay_1
  component_id: switch.gpio
  fields:
    icon: mdi:power-socket-uk
    pin:
      value: 14
      locked: true
    id: relay_1
    name: Switch
- id: sw_led1
  component_id: switch.gpio
  fields:
    pin:
      value: 13
      locked: true
    inverted:
      value: true
      locked: true
    id: sw_led1
    name: sw_led1
