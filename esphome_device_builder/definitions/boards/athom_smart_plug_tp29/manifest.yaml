  - wifi
images:
- https://raw.githubusercontent.com/esphome/devices.esphome.io/main/src/docs/devices/Athom-Smart-Plug-TP29/Athom-EU-Plug.png
tags:
- relay
- compact
pins:
- gpio: 3
  available: false
